        // ============================================================================
        // ROBUST CSV PARSER: Correctly handles newlines (\n) inside quoted cells!
        // This prevents columns from shifting when "平均每人\n分發點數量" is encountered.
        // ============================================================================
        function parseCSV(text) {
            const result = [];
            let row = [];
            let val = "";
            let inQuotes = false;
            
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char === '"') {
                    if (inQuotes && text[i+1] === '"') {
                        val += '"';
                        i++; 
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    row.push(val.trim());
                    val = "";
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (char === '\r' && text[i+1] === '\n') i++; // Handle Windows \r\n
                    row.push(val.trim());
                    result.push(row);
                    row = [];
                    val = "";
                } else {
                    val += char;
                }
            }
            if (val || row.length > 0) {
                row.push(val.trim());
                result.push(row);
            }
            return result;
        }

        const parseNumber = (val) => {
            if (!val || val === '-' || val === '#N/A' || val === 'no data atm' || val === '#DIV/0!') return 0;
            const clean = String(val).replace(/,/g, '').replace(/%/g, '').replace(/\$/g, '').replace(/¥/g, '');
            const num = parseFloat(clean);
            return isNaN(num) ? 0 : num;
        };

        const formatShortCurrency = (val) => {
            if (val === undefined || isNaN(val)) return '-';
            if (val >= 1000000) return '$' + (val / 1000000).toFixed(1) + 'M';
            if (val >= 1000) return '$' + (val / 1000).toFixed(1) + 'K';
            return '$' + val.toLocaleString();
        };

        const getConditionalFormat = (colName, val, targetRatio, ranges) => {
            const num = parseFloat(val);
            if (isNaN(num)) return { className: 'text-gray-800' };

            let className = 'text-gray-900 font-medium ';
            let style = {};

            if (colName === 'Node' || colName === '平均每人' || colName === '平均每人分發點數量') {
                if (num > 200) className += 'bg-green-200';
                else if (num >= 150) className += 'bg-yellow-200';
                else if (num >= 80) className += 'bg-orange-200';
                else className += 'bg-red-200';
            }
            else if (colName === '3天增加') {
                if (num > 0) className += 'bg-green-200';
                else if (num < 0) className += 'bg-red-200';
            }
            else if (colName === '未來 人均 ICB Booking') {
                if (num > 25) className += 'bg-green-200';
                else if (num >= 15) className += 'bg-yellow-200';
                else className += 'bg-red-200';
            }
            else if (colName === '今天新增 ICB Booking' || colName === '昨天新增 ICB Booking') {
                if (num >= 3) className += 'bg-green-200';
                else if (num >= 1) className += 'bg-yellow-200';
                else className += 'bg-red-200';
            }
            else if (colName === 'PT Qty' || colName === '今天 PT QTY' || colName === 'Full course Qty.') {
                if (num >= 3) className += 'bg-green-200';
                else if (num >= 1) className += 'bg-yellow-200';
                else className += 'bg-red-200';
            }
            else if (colName === 'Today MTD%') {
                if (targetRatio && num > (targetRatio * 100)) className += 'bg-purple-300 font-bold';
                else if (num >= 100) className += 'bg-green-200';
                else if (num >= 90) className += 'bg-yellow-200';
                else className += 'bg-red-200';
            }
            else if (['未來 ICB Booking', '當月 激活人數', '今天 Full course', 'Paid Trial 龍尾 Book'].includes(colName)) {
                const range = ranges[colName];
                if (range && range.max > range.min) {
                    const ratio = (num - range.min) / (range.max - range.min);
                    const hue = ratio * 120;
                    style.backgroundColor = `hsl(${hue}, 80%, 85%)`;
                } else if (range && range.max === range.min && range.max > 0) {
                    style.backgroundColor = `hsl(120, 80%, 85%)`;
                }
            }

            return { className, style };
        };

            const fetchData = useCallback(async () => {
                try {
                    setLoading(true);
                    const sheetId = GOOGLE_SHEET_ID;
                    
                    const urls = [`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=(WEB)Real%20Time`];
                    const [realTimeRes] = await Promise.all(urls.map(url => fetch(url)));

                    if (!realTimeRes.ok) throw new Error("Could not fetch the sheet. Please ensure it's set to 'Anyone with the link can view'.");
                    
                    const realTimeCsv = await realTimeRes.text();
                    const realTimeParsed = parseCSV(realTimeCsv);

                    // =========================================================================
                    // 1. STRICT HEADER ANCHOR DETECTION
                    // Scans downwards and locks ONLY onto the row containing "Brand".
                    // This perfectly ignores super-headers like "200 Nodes" that break the mapping.
                    // =========================================================================
                    let headerRowIdx = 0;
                    for (let i = 0; i < Math.min(20, realTimeParsed.length); i++) {
                        const cells = realTimeParsed[i].map(c => (c || '').toString().toLowerCase().replace(/[\s\r\n]+/g, ''));
                        if (cells.includes('brand') || cells.includes('品牌')) {
                            headerRowIdx = i;
                            break;
                        }
                    }

                    // =========================================================================
                    // 2. PERFECT GRAND TOTAL ROW DETECTION
                    // Scans the ENTIRE row (not just slice(0,5)) to ensure it perfectly locks 
                    // onto the Grand Total row, avoiding the Dermes Row fallback bug!
                    // =========================================================================
                    let gtRowIdx = -1;
                    for (let i = 0; i < Math.min(50, realTimeParsed.length); i++) {
                        if (!realTimeParsed[i]) continue;
                        
                        const isGT = realTimeParsed[i].some(c => {
                            const clean = (c || '').toString().toLowerCase().replace(/[^a-z0-9]/gi, '');
                            return clean.includes('grandtotal');
                        });
                        
                        if (isGT) {
                            gtRowIdx = i;
                            setGrandTotalRowRaw(realTimeParsed[i]);
                            break;
                        }
                    }

                    // Calculate Target Ratio
                    let targetRatio = null;
                    if (realTimeParsed.length > 2) {
                        try {
                            const bj3 = parseNumber(realTimeParsed[2][61]);
                            const bm2 = parseNumber(realTimeParsed[1][64]);
                            if (bm2 > 0) targetRatio = (bj3 / bm2) * 1.5;
                        } catch (e) {
                            console.warn("Could not calculate target ratio");
                        }
                    }
                    setMtdTargetRatio(targetRatio);

                    // =========================================================================
                    // 3. DYNAMIC MAPPING ENGINE
                    // ONLY scans the precise header row. If text is altered, safely falls back
                    // to the exact columns defined by the user.
                    // =========================================================================
                    let maxSearchRows = Math.min(15, realTimeParsed.length);
                    let maxCols = 0;
                    for (let i = 0; i < maxSearchRows; i++) {
                        if (realTimeParsed[i] && realTimeParsed[i].length > maxCols) {
                            maxCols = realTimeParsed[i].length;
                        }
                    }
                    const headerEndIdx = gtRowIdx > 0 ? gtRowIdx - 1 : Math.min(5, realTimeParsed.length - 1);

                    const getDynamicIndex = (searchTerms, fallbackIndex) => {
                        const cleanTerms = searchTerms.map(t => t.toLowerCase().replace(/[\s\r\n]+/g, ''));
                        
                        for (let c = 0; c < maxCols; c++) {
                            for (let r = 0; r <= headerEndIdx; r++) {
                                if (!realTimeParsed[r]) continue;
                                const cell = (realTimeParsed[r][c] || '').toString().toLowerCase().replace(/[\s\r\n]+/g, '');
                                if (cleanTerms.includes(cell)) return c;
                            }
                        }
                        
                        for (let c = 0; c < maxCols; c++) {
                            for (let r = 0; r <= headerEndIdx; r++) {
                                if (!realTimeParsed[r]) continue;
                                const cell = (realTimeParsed[r][c] || '').toString().toLowerCase().replace(/[\s\r\n]+/g, '');
                                for (let term of cleanTerms) {
                                    if (term.length >= 2 && cell.startsWith(term)) return c;
                                }
                            }
                        }

                        for (let c = 0; c < maxCols; c++) {
                            for (let r = 0; r <= headerEndIdx; r++) {
                                if (!realTimeParsed[r]) continue;
                                const cell = (realTimeParsed[r][c] || '').toString().toLowerCase().replace(/[\s\r\n]+/g, '');
                                for (let term of cleanTerms) {
                                    if (term.length >= 3 && cell.includes(term)) return c;
                                }
                            }
                        }
                        
                        return fallbackIndex; 
                    };

                    // Using the strictly accurate Fallbacks corresponding to your sheet structure
                    const mappedIndices = {
                        brand: getDynamicIndex(['brand', '品牌'], 0), 
                        center: getDynamicIndex(['center', 'floorlevel(center)', 'floor', '分店'], 2), 
                        therapist: getDynamicIndex(['therapist', '治療師'], 3), 
                        
                        node: getDynamicIndex(['node', 'nodes'], 39), 
                        avgNode: getDynamicIndex(['平均每人分發點數量', '平均每人'], 41),

                        todayFullCourseQty: getDynamicIndex(['今天fullcourseqty', '今天fullcourse'], 50), 
                        paidTrialLongTail: getDynamicIndex(['paidtrial龍尾book', '龍尾book'], 51),

                        todaySales: getDynamicIndex(['今天銷售額', '今天銷售'], 66) 
                    };
                    setColMap(mappedIndices);

                    const finalHeaders = [];
                    for (let c = 0; c < maxCols; c++) {
                        let text = "";
                        for (let r = headerEndIdx; r >= 0; r--) {
                            if (realTimeParsed[r] && realTimeParsed[r][c] && realTimeParsed[r][c].toString().trim() !== '') {

                                break;

                        }
                        finalHeaders.push(text || `Col ${c + 1}`);
                    }
                    setHeaders(finalHeaders);

                    // =========================================================================
                    // 4. EXTRACT DATA & FILTER OUT GRAND TOTAL
                    // =========================================================================
                    const dataStartIdx = gtRowIdx !== -1 ? gtRowIdx + 1 : headerRowIdx + 1;
                    
                    const rawData = realTimeParsed.slice(dataStartIdx).filter(row => {
                        const isGrandTotal = row.slice(0, 5).some(c => 
                            (c || '').toString().toLowerCase().replace(/[\s\r\n]+/g, '').includes('grandtotal')
                        );
                        return row.length > 5 && !isGrandTotal;
                    });
                    
                    let currentBrand = 'Unknown';
                    let currentCenter = 'Unknown';
                    
                    const filledData = rawData.map(row => {
                        if (mappedIndices.brand >= 0 && row[mappedIndices.brand] && row[mappedIndices.brand].toString().trim() !== '') currentBrand = row[mappedIndices.brand];
                        else if (mappedIndices.brand >= 0) row[mappedIndices.brand] = currentBrand;
                        
                        if (mappedIndices.center >= 0 && row[mappedIndices.center] && row[mappedIndices.center].toString().trim() !== '') currentCenter = row[mappedIndices.center];
                        else if (mappedIndices.center >= 0) row[mappedIndices.center] = currentCenter;
                        
                        return row;
                    });

                    setData(filledData);
                    setLastSyncTime(new Date());
                    setError(null);

                } catch (err) {
                    setError(err.message);
                    setColMap({ brand: 0, center: 2, therapist: 3, node: 39, avgNode: 41, node3Days: 43, futureICB: 14, avgFutureICB: 15, todayNewICB: 16, yesterdayNewICB: 17, monthlyActive: 32, ptQty: 44, todayPtQty: 45, fullCourseQty: 47, todayFullCourseQty: 50, paidTrialLongTail: 51, highPexoTodaySales: 49, fullCourseMoney: 48, todayMtdPercent: 62, todaySales: 66 });
                    setMtdTargetRatio(1.2);

                    mockGt[14] = '342'; mockGt[15] = '1.2'; mockGt[16] = '45'; mockGt[17] = '12'; mockGt[32] = '280';
                    mockGt[39] = '862'; mockGt[41] = '200'; mockGt[43] = '12';
                    mockGt[44] = '120'; mockGt[45] = '15'; mockGt[47] = '60'; mockGt[50] = '8'; mockGt[51] = '35'; mockGt[49] = '45000'; mockGt[48] = '125000';

                    ]);
                    setLastSyncTime(new Date());

                    { id: 'fullCourseMoney', index: colMap.fullCourseMoney, name: 'Full Course $', forceName: true, format: 'currency', headerClass: 'bg-green-100 text-green-900 border-t border-green-200' },
                    
                    { id: 'todayMtdPercent', index: colMap.todayMtdPercent, name: 'Today MTD%', format: 'percent', headerClass: 'bg-purple-100 text-purple-900 border-t border-purple-200' },
                    { id: 'todaySales', index: colMap.todaySales, name: '今天銷售額', format: 'currency', headerClass: 'bg-purple-100 text-purple-900 border-t border-purple-200' }
                ].map(kpi => ({
                    ...kpi,
                    displayName: kpi.forceName 
                        ? kpi.name 
                        : (kpi.index >= 0 && headers[kpi.index] && headers[kpi.index].trim() !== '') 
                            ? headers[kpi.index].replace(/[\r\n]+/g, ' ').replace(/"/g, '') 
                            : kpi.name
                }));
            }, [colMap, headers]);

            // Transform raw row into KPI mapped object for easy access
            const mapRowToObject = useCallback((row) => {
                if (!colMap || !row) return null;
                let mapped = { 
                    Brand: colMap.brand >= 0 ? row[colMap.brand] || 'Unknown' : 'Unknown', 
                    Center: colMap.center >= 0 ? row[colMap.center] || 'Unknown' : 'Unknown',
                    Therapist: colMap.therapist >= 0 ? row[colMap.therapist] || '' : '', 
                    raw: row 
                };
                activeKPIs.forEach(kpi => { 
                    mapped[kpi.id] = (kpi.index >= 0) ? parseNumber(row[kpi.index]) : 0; 
                });
                return mapped;
            }, [colMap, activeKPIs]);

            // PRE-PROCESS ALL DATA ONCE
            const allProcessedData = useMemo(() => {
                if (!data || !colMap) return [];
                return data.map((row, idx) => ({ id: `row-${idx}`, ...mapRowToObject(row) }));
            }, [data, colMap, mapRowToObject]);

            const grandTotalData = useMemo(() => grandTotalRowRaw ? mapRowToObject(grandTotalRowRaw) : null, [grandTotalRowRaw, mapRowToObject]);


            // --- DROPDOWN LISTS FOR SUMMARY (WITH RULES) ---
            const summaryBrandsList = useMemo(() => {
                if (!colMap || colMap.brand < 0) return [];
                const validRows = data.filter(r => colMap.center >= 0 && r[colMap.center] && !r[colMap.center].toLowerCase().includes('grand total'));
                const bList = [...new Set(validRows.map(r => r[colMap.brand]).filter(Boolean))]
                    .sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));
                return ['All', ...bList];
            }, [data, colMap]);

            const summaryCentersList = useMemo(() => {
                if (!colMap || colMap.center < 0) return [];
                const validRows = data.filter(r => r[colMap.center] && !r[colMap.center].toLowerCase().includes('grand total'));
                const brandFiltered = summaryBrand === 'All' ? validRows : validRows.filter(r => colMap.brand >= 0 && r[colMap.brand] === summaryBrand);
                const isRestricted = ['dermes', 'elyze', 'reenex'].includes(summaryBrand.toLowerCase());
                
                let rawList = [...new Set(brandFiltered.map(r => r[colMap.center]).filter(Boolean))];
                const hasTotal = rawList.some(c => c.toLowerCase() === 'total');
                
                let sortedCList = rawList
                    .filter(c => c.toLowerCase() !== 'total')
                    .sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));
                
                if (hasTotal) sortedCList = ['Total', ...sortedCList];
                
                if (isRestricted) {
                    return sortedCList; 
                } else {
                    let cList = ['All', ...sortedCList];
                    if (summaryBrand === 'All') cList = cList.filter(c => c.toLowerCase() !== 'total');
                    return cList;
                }
            }, [data, summaryBrand, colMap]);

            const summaryTherapistsList = useMemo(() => {
                if (!colMap || colMap.therapist < 0) return [];
                const validRows = data.filter(r => colMap.center >= 0 && r[colMap.center] && !r[colMap.center].toLowerCase().includes('grand total'));
                let brandFiltered = summaryBrand === 'All' ? validRows : validRows.filter(r => colMap.brand >= 0 && r[colMap.brand] === summaryBrand);
                let centerFiltered = summaryCenter === 'All' ? brandFiltered : brandFiltered.filter(r => colMap.center >= 0 && r[colMap.center] === summaryCenter);
                const isRestricted = ['dermes', 'elyze', 'reenex'].includes(summaryBrand.toLowerCase());
                
                let rawList = [...new Set(centerFiltered.map(r => r[colMap.therapist]).filter(Boolean))];
                const hasTotal = rawList.some(t => t.toLowerCase() === 'total');
                
                let sortedTList = rawList
                    .filter(t => t.toLowerCase() !== 'total')
                    .sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));

                if (hasTotal) sortedTList = ['Total', ...sortedTList];

                if (isRestricted) {
                    return sortedTList; 
                } else {
                    let tList = ['All', ...sortedTList];
                    if (summaryBrand === 'All') tList = tList.filter(t => t.toLowerCase() !== 'total');
                    return tList;
                }
            }, [data, summaryBrand, summaryCenter, colMap]);

            // --- SUMMARY PANEL LOGIC (FIND EXACT MATCH TO PREVENT DOUBLE COUNTING) ---
            const summaryData = useMemo(() => {
                let sums = {
                    totalNodes: 0, nodeDelta: 0, avgNode: 0, futureICB: 0, avgFutureICB: 0, 
                    todayNewICB: 0, yesterdayNewICB: 0, monthlyActive: 0, ptQty: 0, todayPtQty: 0, 
                    fullCourseQty: 0, todayFullCourseQty: 0, paidTrialLongTail: 0, highPexoTodaySales: 0,
                    fullCourseMoney: 0, todayMtdPercent: 0, todaySales: 0
                };

                if (!colMap) return sums;

                const isUnfiltered = summaryBrand === 'All' && summaryCenter === 'All' && summaryTherapist === 'All' && !summarySearchTerm;
                
                let targetRow = null;

                if (isUnfiltered && grandTotalData) {
                    targetRow = grandTotalData;
                } else if (!summarySearchTerm) {
                    const expectedBrand = summaryBrand;
                    const expectedCenter = summaryCenter === 'All' ? 'Total' : summaryCenter;
                    const expectedTherapist = summaryTherapist === 'All' ? 'Total' : summaryTherapist;

                    targetRow = allProcessedData.find(item => 
                        (summaryBrand === 'All' ? true : item.Brand === expectedBrand) &&
                        item.Center.toLowerCase() === expectedCenter.toLowerCase() &&
                        item.Therapist.toLowerCase() === expectedTherapist.toLowerCase()
                    );
                }

                if (targetRow) {
                    sums.totalNodes = targetRow.node || 0;
                    sums.nodeDelta = targetRow.node3Days || 0;
                    sums.avgNode = targetRow.avgNode || 0;
                    sums.futureICB = targetRow.futureICB || 0;
                    sums.avgFutureICB = targetRow.avgFutureICB || 0;
                    sums.todayNewICB = targetRow.todayNewICB || 0;
                    sums.yesterdayNewICB = targetRow.yesterdayNewICB || 0;
                    sums.monthlyActive = targetRow.monthlyActive || 0;
                    sums.ptQty = targetRow.ptQty || 0;
                    sums.todayPtQty = targetRow.todayPtQty || 0;
                    sums.fullCourseQty = targetRow.fullCourseQty || 0;
                    sums.todayFullCourseQty = targetRow.todayFullCourseQty || 0;
                    sums.paidTrialLongTail = targetRow.paidTrialLongTail || 0;
                    sums.highPexoTodaySales = targetRow.highPexoTodaySales || 0;
                    sums.fullCourseMoney = targetRow.fullCourseMoney || 0;
                    sums.todayMtdPercent = targetRow.todayMtdPercent || 0;
                    sums.todaySales = targetRow.todaySales || 0;
                } else {
                    let filtered = allProcessedData.filter(item => !item.Center.toLowerCase().includes('grand total'));
                    
                    if (summaryBrand !== 'All') filtered = filtered.filter(item => item.Brand === summaryBrand);
                    if (summaryCenter !== 'All') filtered = filtered.filter(item => item.Center === summaryCenter);
                    if (summaryTherapist !== 'All') filtered = filtered.filter(item => item.Therapist === summaryTherapist);
                    if (summarySearchTerm) filtered = filtered.filter(item => item.raw.join(' ').toLowerCase().includes(summarySearchTerm.toLowerCase()));

                    const baseRows = filtered.filter(item => item.Center.toLowerCase() !== 'total' && item.Therapist.toLowerCase() !== 'total');

                    baseRows.forEach(item => {
                        sums.totalNodes += item.node || 0;
                        sums.nodeDelta += item.node3Days || 0;
                        sums.avgNode += item.avgNode || 0;
                        sums.futureICB += item.futureICB || 0;
                        sums.avgFutureICB += item.avgFutureICB || 0; 
                        sums.todayNewICB += item.todayNewICB || 0;
                        sums.yesterdayNewICB += item.yesterdayNewICB || 0;
                        sums.monthlyActive += item.monthlyActive || 0;
                        sums.ptQty += item.ptQty || 0;
                        sums.todayPtQty += item.todayPtQty || 0;
                        sums.fullCourseQty += item.fullCourseQty || 0;
                        sums.todayFullCourseQty += item.todayFullCourseQty || 0; 
                        sums.paidTrialLongTail += item.paidTrialLongTail || 0;
                        sums.highPexoTodaySales += item.highPexoTodaySales || 0;
                        sums.fullCourseMoney += item.fullCourseMoney || 0;
                        sums.todayMtdPercent += item.todayMtdPercent || 0;
                        sums.todaySales += item.todaySales || 0;
                    });
                    
                    if (baseRows.length > 0) {
                        sums.todayMtdPercent = sums.todayMtdPercent / baseRows.length;
                        sums.avgFutureICB = sums.avgFutureICB / baseRows.length; 
                        sums.avgNode = sums.avgNode / baseRows.length; 
                    }
                }
                return sums;
            }, [summaryBrand, summaryCenter, summaryTherapist, summarySearchTerm, allProcessedData, grandTotalData, colMap]);


            // --- DROPDOWN LISTS FOR TABLE (NO RESTRICTIONS) ---
            const tableBrandsList = useMemo(() => {
                if (!colMap || colMap.brand < 0) return [];
                const validRows = data.filter(r => colMap.center >= 0 && r[colMap.center] && !r[colMap.center].toLowerCase().includes('grand total'));
                const bList = [...new Set(validRows.map(r => r[colMap.brand]).filter(Boolean))]
                    .sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));
                return ['All', ...bList];
            }, [data, colMap]);

            const tableCentersList = useMemo(() => {
                if (!colMap || colMap.center < 0) return [];
                const validRows = data.filter(r => r[colMap.center] && !r[colMap.center].toLowerCase().includes('grand total'));
                const brandFiltered = tableBrand === 'All' ? validRows : validRows.filter(r => colMap.brand >= 0 && r[colMap.brand] === tableBrand);
                
                let rawList = [...new Set(brandFiltered.map(r => r[colMap.center]).filter(Boolean))];
                const hasTotal = rawList.some(c => c.toLowerCase() === 'total');
                
                let sortedCList = rawList
                    .filter(c => c.toLowerCase() !== 'total')
                    .sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));
                
                if (hasTotal) sortedCList = ['Total', ...sortedCList];
                return ['All', ...sortedCList];
            }, [data, tableBrand, colMap]);

            const tableTherapistsList = useMemo(() => {
                if (!colMap || colMap.therapist < 0) return [];
                const validRows = data.filter(r => colMap.center >= 0 && r[colMap.center] && !r[colMap.center].toLowerCase().includes('grand total'));
                let brandFiltered = tableBrand === 'All' ? validRows : validRows.filter(r => colMap.brand >= 0 && r[colMap.brand] === tableBrand);
                let centerFiltered = tableCenter === 'All' ? brandFiltered : brandFiltered.filter(r => colMap.center >= 0 && r[colMap.center] === tableCenter);
                
                let rawList = [...new Set(centerFiltered.map(r => r[colMap.therapist]).filter(Boolean))];
                const hasTotal = rawList.some(t => t.toLowerCase() === 'total');
                
                let sortedTList = rawList
                    .filter(t => t.toLowerCase() !== 'total')
                    .sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));
                
                if (hasTotal) sortedTList = ['Total', ...sortedTList];
                return ['All', ...sortedTList];
            }, [data, tableBrand, tableCenter, colMap]);

            // --- FILTERED DATA: TABLE ---
            const tableProcessedData = useMemo(() => {
                if (!colMap || activeKPIs.length === 0) return [];
                
                let result = allProcessedData.filter(item => !item.Center.toLowerCase().includes('grand total'));

                if (tableBrand !== 'All') result = result.filter(item => item.Brand === tableBrand);
                if (tableCenter !== 'All') result = result.filter(item => item.Center === tableCenter);
                if (tableTherapist !== 'All') result = result.filter(item => item.Therapist === tableTherapist);

                if (sortConfig.key) {
                    result.sort((a, b) => {
                        const valA = a[sortConfig.key];
                        const valB = b[sortConfig.key];
                        if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1;
                        if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1;
                        return 0;
                    });
                }
                return result;
            }, [tableBrand, tableCenter, tableTherapist, sortConfig, activeKPIs, colMap, allProcessedData]);

            // Calculation of Ranges for Table Gradients
            const colRanges = useMemo(() => {
                const ranges = {};
                if (!activeKPIs) return ranges;
                
                ['未來 ICB Booking', '當月 激活人數', '今天 Full course', 'Paid Trial 龍尾 Book'].forEach(colName => {
                    const kpi = activeKPIs.find(c => c.name === colName);
                    if (kpi) {
                        const vals = tableProcessedData.map(r => r[kpi.id]).filter(v => typeof v === 'number' && !isNaN(v));
                        ranges[colName] = {
                            min: vals.length ? Math.min(...vals) : 0,
                            max: vals.length ? Math.max(...vals) : 100
                        };
                    }
                });
                return ranges;
            }, [tableProcessedData, activeKPIs]);

            const requestSort = (key) => {
                let direction = 'asc';
                if (sortConfig.key === key && sortConfig.direction === 'asc') direction = 'desc';
                setSortConfig({ key, direction });
            };

            const formatDisplayValue = (val, format) => {
                if (val === undefined || isNaN(val)) return '-';
                if (format === 'percent') return `${val.toFixed(2)}%`;
                if (format === 'currency') return `$${val.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
                return Number.isInteger(val) ? val.toLocaleString() : val.toFixed(2).replace(/\.00$/, '');
            };

            const exportToCSV = () => {
                const csvHeaders = ['Brand', 'Floor Level (Center)', 'Therapist', ...activeKPIs.map(kpi => kpi.displayName)];
                
                const csvRows = tableProcessedData.map(row => {
                    const rowData = [
                        row.Brand,
                        row.Center,
                        row.Therapist,
                        ...activeKPIs.map(kpi => formatDisplayValue(row[kpi.id], kpi.format))
                    ];
                    return rowData.map(val => `"${String(val).replace(/"/g, '""')}"`).join(',');
                });

                const csvContent = [
                    csvHeaders.map(h => `"${String(h).replace(/"/g, '""')}"`).join(','), 
                    ...csvRows
                ].join('\n');
                
                const blob = new Blob(["\ufeff", csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", `HK_Collagen_Festival_Data_${new Date().toISOString().slice(0,10)}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            if (loading && data.length === 0) return (
                <div className="flex h-screen w-full items-center justify-center bg-gray-50">
                    <div className="flex flex-col items-center gap-4">
                        <div className="h-12 w-12 animate-spin rounded-full border-4 border-blue-500 border-t-transparent"></div>
                        <p className="text-gray-600 font-medium">Loading Real Time Data...</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-gray-50 p-2 sm:p-4 lg:px-6 xl:px-8 font-sans text-gray-800">
                
                {/* Header & Controls for Summary Panel ONLY */}
                <div className="mb-6 flex flex-col gap-4 bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center w-full gap-4">
                        <h1 className="text-3xl font-extrabold flex items-center gap-3 text-black">
                            <Sparkles className="text-blue-600 w-8 h-8 flex-shrink-0" /> 
                            <span className="drop-shadow-sm">香港少女膠原節：實時成績</span>
                        </h1>
                        <div className="flex items-center gap-3 text-sm text-gray-600">
                            {lastSyncTime && <span className="font-medium">Last synced: {lastSyncTime.toLocaleTimeString()}</span>}
                            <button 
                                onClick={fetchData} 
                                disabled={loading} 
                                className="flex items-center gap-1.5 px-4 py-2 bg-blue-50 text-blue-700 font-semibold rounded-lg hover:bg-blue-100 transition-colors disabled:opacity-50"
                            >
                                <RefreshCw className={`w-4 h-4 ${loading ? 'animate-spin' : ''}`} />
                                {loading ? 'Syncing...' : 'Resync'}
                            </button>
                        </div>
                    </div>
                    
                    <div className="flex flex-col sm:flex-row gap-3 w-full items-center pt-3 border-t border-gray-100">
                        <div className="flex items-center gap-2 text-sm font-semibold text-gray-600 bg-gray-50 px-3 py-2 rounded-lg border border-gray-200">
                            <FilterIcon className="w-4 h-4" /> Filters:
                        </div>
                        <select 
                            className="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white shadow-sm min-w-[140px]"
                            value={summaryBrand} 
                            onChange={(e) => { 
                                const newBrand = e.target.value;
                                setSummaryBrand(newBrand); 
                                
                                if (['dermes', 'elyze', 'reenex'].includes(newBrand.toLowerCase())) {
                                    setSummaryCenter('Total');
                                    setSummaryTherapist('Total');
                                } else {
                                    setSummaryCenter('All'); 
                                    setSummaryTherapist('All'); 
                                }
                            }}
                        >
                            {summaryBrandsList.map(b => (
                                <option key={b} value={b}>{b === 'All' ? 'All Brands' : b}</option>
                            ))}
                        </select>
                        <select 
                            className={`border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm min-w-[140px] ${summaryBrand === 'All' ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'bg-white'}`}
                            value={summaryCenter} 
                            onChange={(e) => { 
                                setSummaryCenter(e.target.value); 
                                if (['dermes', 'elyze', 'reenex'].includes(summaryBrand.toLowerCase())) {
                                    setSummaryTherapist('Total');
                                } else {
                                    setSummaryTherapist('All');
                                }
                            }}
                            disabled={summaryBrand === 'All'}
                        >
                            {summaryCentersList.map(c => (
                                <option key={c} value={c}>{c === 'All' ? 'All Floor Levels' : c}</option>
                            ))}
                        </select>
                        <select 
                            className="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white shadow-sm min-w-[140px]"
                            value={summaryTherapist} 
                            onChange={(e) => setSummaryTherapist(e.target.value)}
                        >
                            {summaryTherapistsList.map(t => (
                                <option key={t} value={t}>{t === 'All' ? 'All Therapists' : t}</option>
                            ))}
                        </select>
                        <div className="relative">
                            <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 w-4 h-4" />
                            <input
                                type="text" placeholder="Search data..."
                                className="pl-9 pr-4 py-2 bg-white shadow-sm border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 w-full"
                                value={summarySearchTerm} onChange={(e) => setSummarySearchTerm(e.target.value)}
                            />
                        </div>
                    </div>
                </div>

                {error && (
                    <div className="mb-6 p-4 bg-red-50 border border-red-200 text-red-700 rounded-xl flex items-start gap-3">
                        <AlertCircle className="shrink-0 w-5 h-5 mt-0.5" />
                        <div>
                            <h3 className="font-semibold">Unable to fetch sheet data live</h3>
                            <p className="text-sm mt-1">{error}</p>
                            <p className="text-sm mt-1 font-medium">Currently displaying fallback visual structure.</p>
                        </div>
                    </div>
                )}

                {/* --- SUMMARY PANEL --- */}
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-10">
                    
                    {/* 1st Section (Dark Blue Box) */}
                    <div className="bg-blue-800 rounded-xl p-3 flex flex-col shadow-lg h-full transition-transform hover:-translate-y-1">
                        <h3 className="flex items-center justify-center gap-1.5 font-bold text-lg mb-2 border-b border-blue-600 pb-1 tracking-wide text-white">
                            <Share2 className="w-5 h-5 text-blue-200" />
                            200分發點
                        </h3>
                        
                        <div className="flex flex-col items-center bg-white/70 rounded-lg py-2 mb-2 shadow-sm">
                            <span className="text-4xl font-extrabold text-gray-800">{summaryData.totalNodes.toLocaleString()}</span>
                            <span className="text-xs text-gray-700 mt-1 uppercase tracking-wider font-bold">Total Nodes</span>
                        </div>
                        
                        <div className="flex justify-between items-stretch gap-2 mt-auto">
                            <div className="bg-white/70 border border-white/50 rounded-lg p-2 flex-1 flex flex-col justify-center items-center text-center shadow-inner">
                                <span className="text-xl font-extrabold text-gray-800">{summaryData.nodeDelta > 0 ? `+${summaryData.nodeDelta}` : summaryData.nodeDelta}</span>
                                <span className="text-xs text-gray-700 font-bold uppercase mt-1 leading-tight">Node 3 Days Changes</span>
                            </div>
                            <div className="bg-white/70 border border-white/50 rounded-lg p-2 flex-1 flex flex-col justify-center items-center text-center shadow-inner">
                                <span className="text-xl font-extrabold text-gray-800">
                                    {summaryData.avgNode.toFixed(1)}
                                </span>
                                <span className="text-xs text-gray-700 font-bold uppercase mt-1 leading-tight">平均每人<br/>分發點數量</span>
                            </div>
                        </div>
                    </div>

                    {/* 2nd Section (Orange Box) */}
                    <div className="bg-orange-500 rounded-xl p-3 flex flex-col shadow-lg h-full transition-transform hover:-translate-y-1">
                        <h3 className="flex items-center justify-center gap-1.5 font-bold text-lg mb-2 border-b border-orange-400 pb-1 tracking-wide text-white">
                            <CalendarCheck className="w-5 h-5 text-orange-200" />
                            862+ICB
                        </h3>
                        
                        <div className="flex justify-between items-center bg-white/70 rounded-lg p-2 mb-2 shadow-sm">
                            <div className="flex flex-col items-center flex-1">
                                <span className="text-4xl font-extrabold text-gray-800">{summaryData.futureICB.toLocaleString()}</span>
                                <span className="text-[10px] text-gray-700 mt-0.5 uppercase tracking-wider font-bold">未來 ICB Booking</span>
                            </div>
                            <div className="flex flex-col items-center justify-center pl-2 border-l border-white/50 min-w-[70px]">
                                <span className="text-2xl font-extrabold text-gray-800">{summaryData.monthlyActive.toLocaleString()}</span>
                                <span className="text-[9px] text-gray-700 font-bold uppercase leading-tight mt-1">當月<br/>激活人數</span>
                            </div>
                        </div>
                        
                        <div className="grid grid-cols-3 gap-1 mt-auto">
                            <div className="bg-white/70 border border-white/50 rounded-lg p-2 flex flex-col justify-center items-center text-center shadow-inner">
                                <span className="text-xl font-extrabold text-gray-800">{summaryData.avgFutureICB.toLocaleString()}</span>
                                <span className="text-[10px] text-gray-700 font-bold uppercase leading-tight mt-1">未來 人均<br/>ICB Booking</span>
                            </div>

                                <span className="text-xl font-extrabold text-gray-800">{summaryData.todayNewICB.toLocaleString()}</span>
                                <span className="text-[10px] text-gray-700 font-bold uppercase leading-tight mt-1">今天新增<br/>ICB Booking</span>
                            </div>
                            <div className="bg-white/70 border border-white/50 rounded-lg p-2 flex flex-col justify-center items-center text-center shadow-inner">
                                <span className="text-xl font-extrabold text-gray-800">{summaryData.yesterdayNewICB.toLocaleString()}</span>
                                <span className="text-[10px] text-gray-700 font-bold uppercase leading-tight mt-1">昨天新增<br/>ICB Booking</span>
                            </div>
                        </div>
                    </div>

                    {/* 3rd Section (Green Box) */}
                    <div className="bg-[#4caf50] rounded-xl p-3 flex flex-col shadow-lg h-full transition-transform hover:-translate-y-1">
                        <h3 className="flex items-center justify-center gap-1.5 font-bold text-lg mb-2 border-b border-[#3d8c40] pb-1 tracking-wide text-white">
                            <TrendingUp className="w-5 h-5 text-green-200" />
                            High PEXO
                        </h3>
                        
                        <div className="grid grid-cols-2 gap-2 mb-2">
                            <div className="flex flex-col items-center bg-white/70 rounded-lg py-2 shadow-sm">
                                <div className="text-3xl font-extrabold flex items-baseline text-gray-800">
                                    {summaryData.ptQty.toLocaleString()} 
                                    <span className="text-base text-gray-600 ml-1 font-bold">({summaryData.todayPtQty})</span>
                                </div>
                                <span className="text-xs text-gray-700 mt-1 uppercase tracking-wider font-extrabold">PT Qty (今日)</span>
                            </div>
                            
                            <div className="flex flex-col items-center bg-white/70 rounded-lg py-2 shadow-sm">
                                <div className="text-3xl font-extrabold flex items-baseline text-gray-800">
                                    {summaryData.fullCourseQty.toLocaleString()} 
                                    <span className="text-base text-gray-600 ml-1 font-bold">({summaryData.todayFullCourseQty})</span>
                                </div>
                                <span className="text-xs text-gray-700 mt-1 uppercase tracking-wider font-extrabold">Full Course Qty (今日)</span>
                            </div>
                        </div>
                        
                        <div className="flex justify-between items-stretch gap-2 mt-auto">
                            <div className="bg-white/70 border border-white/50 rounded-lg p-1.5 flex-1 flex flex-col justify-center items-center text-center shadow-inner">
                                <span className="text-lg font-extrabold text-gray-800">{summaryData.paidTrialLongTail.toLocaleString()}</span>
                                <span className="text-[9px] text-gray-700 font-extrabold uppercase mt-1 leading-tight">Paid Trial<br/>龍尾 Book</span>
                            </div>
                            <div className="bg-white/70 border border-white/50 rounded-lg p-1.5 flex-1 flex flex-col justify-center items-center text-center shadow-inner">
                                <span className="text-lg font-extrabold text-gray-800">{formatShortCurrency(summaryData.highPexoTodaySales)}</span>
                                <span className="text-[9px] text-gray-700 font-extrabold uppercase mt-1 leading-tight">今日銷售</span>
                            </div>
                            <div className="bg-white/70 border border-white/50 rounded-lg p-1.5 flex-1 flex flex-col justify-center items-center text-center shadow-inner">
                                <span className="text-lg font-extrabold text-gray-800">{formatShortCurrency(summaryData.fullCourseMoney)}</span>
                                <span className="text-[9px] text-gray-700 font-extrabold uppercase mt-1 leading-tight">Full Course $</span>
                            </div>
                        </div>
                    </div>

                    {/* 4th Section (Purple Box) */}
                    <div className="bg-purple-600 rounded-xl p-3 flex flex-col shadow-lg h-full transition-transform hover:-translate-y-1">
                        <h3 className="flex items-center justify-center gap-1.5 font-bold text-lg mb-2 border-b border-purple-400 pb-1 tracking-wide text-white">
                            <Zap className="w-5 h-5 text-purple-200" />
                            200% 紫燈
                        </h3>
                        
                        <div className="flex flex-col justify-between h-full gap-2">
                            <div className="flex flex-col items-center bg-white/70 rounded-lg py-3 flex-1 justify-center shadow-sm">
                                <div className="text-3xl font-extrabold text-gray-800">{summaryData.todayMtdPercent.toLocaleString()}%</div>
                                <span className="text-xs text-gray-700 mt-1 font-bold uppercase tracking-wider">Today MTD%</span>
                            </div>
                            
                            <div className="flex flex-col items-center bg-white/70 rounded-lg py-3 flex-1 justify-center shadow-sm">
                                <div className="text-3xl font-extrabold text-gray-800">{formatShortCurrency(summaryData.todaySales)}</div>
                                <span className="text-xs text-gray-700 mt-1 font-bold uppercase tracking-wider">今日銷售額</span>
                            </div>
                        </div>
                    </div>

                </div>

                {/* --- TABLE SEPARATION AND TITLE --- */}
                <div className="mt-10 mb-4">
                    <hr className="border-t-2 border-gray-200 mb-6" />
                    <div className="flex justify-between items-center px-2">
                        <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                            <TableIcon className="w-5 h-5 text-blue-600" />
                            Detailed Table
                        </h2>
                        <button 
                            onClick={exportToCSV}
                            className="flex items-center gap-1.5 px-4 py-2 bg-green-50 text-green-700 font-semibold rounded-lg hover:bg-green-100 transition-colors text-sm border border-green-200 shadow-sm"
                        >
                            <Download className="w-4 h-4" />
                            Export CSV
                        </button>
                    </div>
                </div>

                {/* --- DATA TABLE --- */}
                <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div className="overflow-x-auto max-h-[75vh]">
                        <table className="w-full text-sm text-left whitespace-nowrap border-collapse">
                            <thead className="text-xs text-gray-700 bg-gray-50 sticky top-0 z-40 shadow-sm">
                                {/* Multi-level Super Headers */}
                                <tr>
                                    <th className="bg-white border-b border-gray-200 border-r sticky left-0 z-40 min-w-[60px] max-w-[60px] w-[60px]"></th>
                                    <th className="bg-white border-b border-gray-200 border-r sticky left-[60px] z-40 min-w-[90px] max-w-[90px] w-[90px]"></th>
                                    <th className="bg-white border-b border-gray-200 border-r sticky left-[150px] z-40 min-w-[85px] max-w-[85px] w-[85px] shadow-[4px_0_8px_-2px_rgba(0,0,0,0.1)]"></th>
                                    
                                    <th colSpan="3" className="bg-blue-800 text-white text-center font-bold py-1.5 border-r border-blue-900 text-[11px] tracking-wide">
                                        200 Nodes
                                    </th>

                                    <th colSpan="5" className="bg-orange-500 text-white text-center font-bold py-1.5 border-r border-orange-600 text-[11px] tracking-wide">
                                        862+ICB
                                    </th>
                                    
                                    <th colSpan="5" className="bg-[#4caf50] text-white text-center font-bold py-1.5 border-r border-green-700 text-[11px] tracking-wide">
                                        High Pexo PT/Head
                                    </th>
                                    
                                    <th colSpan="2" className="bg-purple-600 text-white text-center font-bold py-1.5 text-[11px] tracking-wide">
                                        200% Purple Light
                                    </th>
                                </tr>
                                
                                {/* Sortable KPI Headers */}
                                <tr>
                                    {/* Sortable Main Hierarchy Headers (FROZEN/STICKY) */}
                                    <th className="px-1 py-1.5 font-bold hover:bg-gray-200 transition-colors border-b border-r border-gray-200 bg-gray-50 align-top min-w-[60px] max-w-[60px] w-[60px] sticky left-0 z-40">
                                        <div className="flex items-center gap-0.5 cursor-pointer mb-1 text-[10px] justify-between" onClick={() => requestSort('Brand')}>
                                            <span className="truncate">Brand</span>
                                            {sortConfig.key === 'Brand' ? (sortConfig.direction === 'asc' ? <ChevronUp className="w-3 h-3 flex-shrink-0" /> : <ChevronDown className="w-3 h-3 flex-shrink-0" />) : <ChevronDown className="w-3 h-3 opacity-20 flex-shrink-0" />}
                                        </div>
                                        <select 
                                            className="w-full text-[9px] font-normal border border-gray-300 rounded text-gray-700 bg-white py-0.5 px-0.5 focus:outline-none focus:ring-1 focus:ring-blue-500 mt-0.5"
                                            value={tableBrand}
                                            onChange={(e) => { setTableBrand(e.target.value); setTableCenter('All'); setTableTherapist('All'); }}
                                        >
                                            {tableBrandsList.map(b => <option key={b} value={b}>{b === 'All' ? 'All' : b}</option>)}
                                        </select>
                                    </th>
                                    <th className="px-1 py-1.5 font-bold hover:bg-gray-200 transition-colors border-b border-r border-gray-200 bg-gray-50 align-top min-w-[90px] max-w-[90px] w-[90px] sticky left-[60px] z-40">
                                        <div className="flex items-center gap-0.5 cursor-pointer mb-1 text-[10px] justify-between" onClick={() => requestSort('Center')}>
                                            <span className="truncate">Floor</span>
                                            {sortConfig.key === 'Center' ? (sortConfig.direction === 'asc' ? <ChevronUp className="w-3 h-3 flex-shrink-0" /> : <ChevronDown className="w-3 h-3 flex-shrink-0" />) : <ChevronDown className="w-3 h-3 opacity-20 flex-shrink-0" />}
                                        </div>
                                        <select 
                                            className="w-full text-[9px] font-normal border border-gray-300 rounded text-gray-700 bg-white py-0.5 px-0.5 focus:outline-none focus:ring-1 focus:ring-blue-500 mt-0.5"
                                            value={tableCenter}
                                            onChange={(e) => { setTableCenter(e.target.value); setTableTherapist('All'); }}
                                        >
                                            {tableCentersList.map(c => <option key={c} value={c}>{c === 'All' ? 'All Floors' : c}</option>)}
                                        </select>
                                    </th>
                                    <th className="px-1 py-1.5 font-bold hover:bg-gray-200 transition-colors border-b border-r border-gray-200 bg-gray-50 align-top min-w-[85px] max-w-[85px] w-[85px] sticky left-[150px] z-40 shadow-[4px_0_8px_-2px_rgba(0,0,0,0.1)]">
                                        <div className="flex items-center gap-0.5 cursor-pointer mb-1 text-[10px] justify-between" onClick={() => requestSort('Therapist')}>
                                            <span className="truncate">Therapist</span>
                                            {sortConfig.key === 'Therapist' ? (sortConfig.direction === 'asc' ? <ChevronUp className="w-3 h-3 flex-shrink-0" /> : <ChevronDown className="w-3 h-3 flex-shrink-0" />) : <ChevronDown className="w-3 h-3 opacity-20 flex-shrink-0" />}
                                        </div>
                                        <select 
                                            className="w-full text-[9px] font-normal border border-gray-300 rounded text-gray-700 bg-white py-0.5 px-0.5 focus:outline-none focus:ring-1 focus:ring-blue-500 mt-0.5"
                                            value={tableTherapist}
                                            onChange={(e) => setTableTherapist(e.target.value)}
                                        >
                                            {tableTherapistsList.map(t => <option key={t} value={t}>{t === 'All' ? 'All' : t}</option>)}
                                        </select>
                                    </th>
                                    
                                    {/* Sortable Custom KPI Headers mapping their specific background classes */}
                                    {activeKPIs.map(kpi => (
                                        <th key={kpi.id} onClick={() => requestSort(kpi.id)} className={`px-1 py-2 font-bold cursor-pointer hover:opacity-80 transition-opacity border-b border-r border-black/5 text-center group align-top min-w-[70px] text-[10px] ${kpi.headerClass}`}>
                                            <div className="flex items-center justify-center gap-0.5 h-full">
                                                <span className="whitespace-normal break-words leading-tight" title={kpi.displayName}>{kpi.displayName}</span>
                                                {sortConfig.key === kpi.id ? (
                                                    sortConfig.direction === 'asc' ? <ChevronUp className="w-3 h-3 flex-shrink-0" /> : <ChevronDown className="w-3 h-3 flex-shrink-0" />
                                                ) : <ChevronDown className="w-3 h-3 opacity-0 group-hover:opacity-40 flex-shrink-0" />}
                                            </div>
                                        </th>
                                    ))}
                                </tr>
                            </thead>
                            
                            <tbody className="divide-y divide-gray-100 relative z-0">
                                {tableProcessedData.length > 0 ? (
                                    tableProcessedData.map((row) => (
                                        <tr key={row.id} className="hover:bg-gray-50 transition-colors group">
                                            {/* Frozen Cells in Body */}
                                            <td className="px-1.5 py-1.5 font-semibold text-[11px] text-gray-800 border-r border-gray-200 bg-white group-hover:bg-gray-50 sticky left-0 z-20 min-w-[60px] max-w-[60px] w-[60px] truncate" title={row.Brand}>{row.Brand}</td>
                                            <td className="px-1.5 py-1.5 font-semibold text-[11px] text-gray-800 border-r border-gray-200 bg-white group-hover:bg-gray-50 sticky left-[60px] z-20 min-w-[90px] max-w-[90px] w-[90px] truncate" title={row.Center}>{row.Center}</td>
                                            <td className="px-1.5 py-1.5 text-[11px] text-gray-600 border-r border-gray-200 bg-white group-hover:bg-gray-50 sticky left-[150px] z-20 min-w-[85px] max-w-[85px] w-[85px] truncate shadow-[4px_0_8px_-2px_rgba(0,0,0,0.1)]" title={row.Therapist}>{row.Therapist}</td>
                                            
                                            {/* Data Cells */}
                                            {activeKPIs.map(kpi => {
                                                const condFormat = getConditionalFormat(kpi.name, row[kpi.id], mtdTargetRatio, colRanges);
                                                return (
                                                    <td key={kpi.id} 
                                                        className={`px-1.5 py-1.5 text-center font-bold text-[11px] border-r border-gray-50/50 ${condFormat.className}`}
                                                        style={condFormat.style}
                                                    >
                                                        {formatDisplayValue(row[kpi.id], kpi.format)}
                                                    </td>
                                                );
                                            })}
                                        </tr>
                                    ))
                                ) : (
                                    <tr>
                                        <td colSpan={100} className="px-6 py-12 text-center text-gray-500 font-medium bg-gray-50 text-xs">
                                            No matching data found for the applied filters.
                                        </td>
                                    </tr>
                                )}
                            </tbody>
                        </table>
                    </div>
                    <div className="p-3 border-t border-gray-200 bg-gray-50 text-[11px] text-gray-500 text-right font-medium">
                        Showing {tableProcessedData.length} active rows.
                    </div>
                </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
