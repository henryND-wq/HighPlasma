<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>少女膠原推廣實時成績</title>
    
    <!-- Load React, ReactDOM, Babel, and Tailwind via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Inline SVG Icons ---
        const BarChart3 = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>;
        const Search = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;
        const ChevronDown = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m6 9 6 6 6-6"/></svg>;
        const ChevronUp = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m18 15-6-6-6 6"/></svg>;
        const AlertCircle = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>;
        const FilterIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>;
        const TableIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" x2="21" y1="9" y2="9"/><line x1="3" x2="21" y1="15" y2="15"/><line x1="9" x2="9" y1="9" y2="21"/><line x1="15" x2="15" y1="9" y2="21"/></svg>;
        const RefreshCw = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;

        // Specific KPIs mapped with groups and designated light colors
        const KPI_COLS = [
            // 200 Nodes Group (Light Naval Blue)
            { letter: 'W', index: 22, name: 'Node', format: 'number', headerClass: 'bg-blue-100 text-blue-900 border-t border-blue-200' },
            { letter: 'Y', index: 24, name: '平均每人', format: 'number', headerClass: 'bg-blue-100 text-blue-900 border-t border-blue-200' },
            { letter: 'AA', index: 26, name: '3天增加', format: 'number', headerClass: 'bg-blue-100 text-blue-900 border-t border-blue-200' },

            // 862+ICB Group (Light Orange)
            { letter: 'N', index: 13, name: '未來 ICB Booking', format: 'number', headerClass: 'bg-orange-100 text-orange-900 border-t border-orange-200' },
            { letter: 'P', index: 15, name: '未來 人均 CB Booking', format: 'number', headerClass: 'bg-orange-100 text-orange-900 border-t border-orange-200' },
            { letter: 'Q', index: 16, name: '今天新增 CB Booking', format: 'number', headerClass: 'bg-orange-100 text-orange-900 border-t border-orange-200' },
            { letter: 'R', index: 17, name: '當月 激活人數', format: 'number', headerClass: 'bg-orange-100 text-orange-900 border-t border-orange-200' },
            
            // High Pexo PT/Head Group (Light Green)
            { letter: 'AB', index: 27, name: 'PT Qty', format: 'number', headerClass: 'bg-green-100 text-green-900 border-t border-green-200' },
            { letter: 'AC', index: 28, name: '今天 PT QTY', format: 'number', headerClass: 'bg-green-100 text-green-900 border-t border-green-200' },
            { letter: 'AE', index: 30, name: '今天 Full course', format: 'number', headerClass: 'bg-green-100 text-green-900 border-t border-green-200' },
            { letter: 'R_Tail', index: 17, name: 'Paid Trial 龍尾 Book', format: 'number', headerClass: 'bg-green-100 text-green-900 border-t border-green-200' },
            
            // 200% Purple Light Group (Light Purple)
            { letter: 'AT', index: 45, name: 'Today MTD%', format: 'percent', headerClass: 'bg-purple-100 text-purple-900 border-t border-purple-200' }, 
            { letter: 'AX', index: 49, name: '今天銷售額', format: 'currency', headerClass: 'bg-purple-100 text-purple-900 border-t border-purple-200' }
        ];

        // Helper to parse CSV manually
        function parseCSV(text) {
            const result = [];
            const lines = text.split(/\r?\n/);
            for (let line of lines) {
                const row = [];
                let inQuotes = false;
                let val = "";
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) { row.push(val.trim()); val = ""; }
                    else val += char;
                }
                row.push(val.trim());
                result.push(row);
            }
            return result;
        }

        const parseNumber = (val) => {
            if (!val || val === '-' || val === '#N/A' || val === 'no data atm' || val === '#DIV/0!') return 0;
            const clean = String(val).replace(/,/g, '').replace(/%/g, '').replace(/\$/g, '').replace(/¥/g, '');
            const num = parseFloat(clean);
            return isNaN(num) ? 0 : num;
        };

        const getConditionalFormat = (colName, val) => {
            const num = parseFloat(val);
            if (isNaN(num)) return '';

            if (colName === 'Node' || colName === '平均每人') {
                if (num > 200) return 'text-green-600 font-extrabold';
                if (num >= 150) return 'text-yellow-500 font-extrabold';
                if (num >= 80) return 'text-orange-500 font-extrabold';
                return 'text-red-600 font-extrabold';
            }
            if (colName === '3天增加') {
                if (num > 0) return 'text-green-600 font-extrabold';
                if (num < 0) return 'text-red-600 font-extrabold';
                return '';
            }
            return '';
        };

        const GOOGLE_SHEET_ID = '1mtORjZ4a5EyrlPJsiejhXuMZiyw5MStoXdxn5l1Jhno';

        function App() {
            const [data, setData] = useState([]);
            const [headers, setHeaders] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            const [globalSummary, setGlobalSummary] = useState({ totalNodes: 0, nodeDelta: 0, identitiesB5: 1 });
            const [grandTotalRow, setGrandTotalRow] = useState(null);

            const [searchTerm, setSearchTerm] = useState('');
            const [selectedBrand, setSelectedBrand] = useState('All');
            const [selectedCenter, setSelectedCenter] = useState('All');
            const [selectedTherapist, setSelectedTherapist] = useState('All');
            const [lastSyncTime, setLastSyncTime] = useState(null);
            
            const [sortConfig, setSortConfig] = useState({ key: null, direction: 'asc' });

            const fetchData = React.useCallback(async () => {
                try {
                    setLoading(true);
                    const sheetId = GOOGLE_SHEET_ID;
                    
                    const urls = [
                    `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=real%20time`,
                    `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=Overview`,
                    `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=Identities`
                    ];

                    const [realTimeRes, overviewRes, identitiesRes] = await Promise.all(
                    urls.map(url => fetch(url))
                    );

                    if (!realTimeRes.ok) throw new Error("Could not fetch the sheet. Please ensure it's set to 'Anyone with the link can view'.");
                    
                    const realTimeCsv = await realTimeRes.text();
                    const overviewCsv = await overviewRes.text();
                    const identitiesCsv = await identitiesRes.text();

                    const realTimeParsed = parseCSV(realTimeCsv);
                    const overviewParsed = parseCSV(overviewCsv);
                    const identitiesParsed = parseCSV(identitiesCsv);

                    // --- 1. EXTRACT DATA FOR GLOBAL SUMMARY PANEL ---
                    let totalNodes = 0;
                    let nodeDelta = 0;
                    overviewParsed.forEach(row => {
                        if (row[0] === 'Nodes') totalNodes = parseNumber(row[1]);
                        if (row[0] === 'Nodes_Delta') nodeDelta = parseNumber(row[1]);
                    });

                    let identitiesB5 = 1;
                    if (identitiesParsed.length > 4 && identitiesParsed[4].length > 1) {
                        identitiesB5 = parseNumber(identitiesParsed[4][1]) || 1; 
                    }

                    setGlobalSummary({ totalNodes, nodeDelta, identitiesB5 });

                    // Find Grand Total row for fallback default calculations
                    const gtRow = realTimeParsed.find(row => row[2] === 'Grand Total');
                    if (gtRow) setGrandTotalRow(gtRow);

                    // --- 2. EXTRACT DATA FOR MAIN TABLE ---
                    let headerRowIdx = 0;
                    for (let i = 0; i < Math.min(10, realTimeParsed.length); i++) {
                        if (realTimeParsed[i].some(cell => cell.toLowerCase().includes('brand') || cell.toLowerCase().includes('center'))) {
                            headerRowIdx = i;
                            break;
                        }
                    }

                    // Extract and "Fill Down" missing Brands/Centers to fetch Therapist rows correctly
                    const extractedHeaders = realTimeParsed[headerRowIdx];
                    const rawData = realTimeParsed.slice(headerRowIdx + 1, 300).filter(row => row.length > 5); 
                    
                    let currentBrand = 'Unknown';
                    let currentCenter = 'Unknown';
                    
                    const filledData = rawData.map(row => {
                        // Inherit Brand if empty
                        if (row[0] && row[0].trim() !== '') currentBrand = row[0];
                        else row[0] = currentBrand;
                        
                        // Inherit Center if empty
                        if (row[2] && row[2].trim() !== '') currentCenter = row[2];
                        else row[2] = currentCenter;
                        
                        return row;
                    });

                    const finalHeaders = extractedHeaders.map((h, i) => h || `Col ${i + 1}`);

                    setHeaders(finalHeaders);
                    setData(filledData);
                    setLastSyncTime(new Date());
                    setError(null);

                } catch (err) {
                    setError(err.message);
                    
                    setGlobalSummary({ totalNodes: 862, nodeDelta: 12, identitiesB5: 4.31 });
                    
                    let mockGt = new Array(60).fill('0');
                    mockGt[13] = '342'; mockGt[14] = '1.2'; mockGt[15] = '45'; mockGt[17] = '280';
                    mockGt[27] = '120'; mockGt[28] = '15'; mockGt[30] = '60'; mockGt[31] = '8'; mockGt[34] = '125000';
                    mockGt[45] = '42.5'; mockGt[49] = '35000';
                    setGrandTotalRow(mockGt);

                    setHeaders(['Brand', 'PIC', 'Center', 'Therapist', ...Array(50).fill('Data')]);
                    setData([
                        ['Brand A', 'John Doe', 'Center North', 'Alice', ...Array(50).fill('100')],
                        ['Brand B', 'Jane Smith', 'Center South', 'Bob', ...Array(50).fill('200')],
                    ]);
                    setLastSyncTime(new Date());
                } finally {
                    setLoading(false);
                }
            }, []);

            useEffect(() => {
                fetchData();
            }, [fetchData]);

            const brands = useMemo(() => {
                const validRows = data.filter(r => r[2] !== 'Grand Total');
                return ['All', ...new Set(validRows.map(r => r[0]).filter(Boolean))];
            }, [data]);

            const centers = useMemo(() => {
                const validRows = data.filter(r => r[2] !== 'Grand Total');
                const brandFiltered = selectedBrand === 'All' ? validRows : validRows.filter(r => r[0] === selectedBrand);
                return ['All', ...new Set(brandFiltered.map(r => r[2]).filter(Boolean))];
            }, [data, selectedBrand]);

            const therapists = useMemo(() => {
                const validRows = data.filter(r => r[2] !== 'Grand Total');
                let brandFiltered = selectedBrand === 'All' ? validRows : validRows.filter(r => r[0] === selectedBrand);
                let centerFiltered = selectedCenter === 'All' ? brandFiltered : brandFiltered.filter(r => r[2] === selectedCenter);
                return ['All', ...new Set(centerFiltered.map(r => r[3]).filter(Boolean))];
            }, [data, selectedBrand, selectedCenter]);

            const activeKPIs = KPI_COLS.map(kpi => ({
                ...kpi,
                displayName: headers[kpi.index] ? headers[kpi.index].replace(/"/g, '') : kpi.name
            }));

            const processedData = useMemo(() => {
                let filtered = data.filter(row => row[2] !== 'Grand Total');

                if (selectedBrand !== 'All') filtered = filtered.filter(row => row[0] === selectedBrand);
                if (selectedCenter !== 'All') filtered = filtered.filter(row => row[2] === selectedCenter);
                if (selectedTherapist !== 'All') filtered = filtered.filter(row => row[3] === selectedTherapist);
                if (searchTerm) filtered = filtered.filter(row => row.join(' ').toLowerCase().includes(searchTerm.toLowerCase()));

                let result = filtered.map((row, idx) => ({
                    id: `row-${idx}`, 
                    Brand: row[0] || 'Unknown', 
                    Center: row[2] || 'Unknown',
                    Therapist: row[3] || '', // Added Therapist back
                    raw: row,
                    ...activeKPIs.reduce((acc, kpi) => ({ ...acc, [kpi.letter]: parseNumber(row[kpi.index]) }), {})
                }));

                if (sortConfig.key) {
                    result.sort((a, b) => {
                        const valA = a[sortConfig.key];
                        const valB = b[sortConfig.key];
                        if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1;
                        if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1;
                        return 0;
                    });
                }
                return result;
            }, [data, searchTerm, selectedBrand, selectedCenter, selectedTherapist, sortConfig, headers]);

            const summaryData = useMemo(() => {
                const isFiltered = selectedBrand !== 'All' || selectedCenter !== 'All' || selectedTherapist !== 'All' || searchTerm !== '';
                
                let sums = {
                    futureICB: 0, avgFutureICB: 0, todayNewICB: 0, monthlyActive: 0,
                    ptQty: 0, todayPtQty: 0, fullCourseQty: 0, todayFullCourseQty: 0, paidTrialLongTail: 0,
                    fullCourseMoney: 0, todayMtdPercent: 0, todaySales: 0
                };

                if (!isFiltered && grandTotalRow) {
                    sums.futureICB = parseNumber(grandTotalRow[13]);
                    sums.avgFutureICB = parseNumber(grandTotalRow[14]);
                    sums.todayNewICB = parseNumber(grandTotalRow[15]);
                    sums.monthlyActive = parseNumber(grandTotalRow[17]);
                    
                    sums.ptQty = parseNumber(grandTotalRow[27]);        // AB
                    sums.todayPtQty = parseNumber(grandTotalRow[28]);   // AC
                    sums.fullCourseQty = parseNumber(grandTotalRow[30]);// AE
                    sums.todayFullCourseQty = parseNumber(grandTotalRow[31]); // AF (For Bracket)
                    sums.paidTrialLongTail = parseNumber(grandTotalRow[17]);  // R
                    sums.fullCourseMoney = parseNumber(grandTotalRow[34]);    // AI
                    
                    sums.todayMtdPercent = parseNumber(grandTotalRow[45]);    // AT (Fixed)
                    sums.todaySales = parseNumber(grandTotalRow[49]);         // AX
                } else {
                    processedData.forEach(item => {
                        const row = item.raw;
                        sums.futureICB += parseNumber(row[13]);
                        sums.avgFutureICB += parseNumber(row[14]); 
                        sums.todayNewICB += parseNumber(row[15]);
                        sums.monthlyActive += parseNumber(row[17]);
                        
                        sums.ptQty += parseNumber(row[27]);
                        sums.todayPtQty += parseNumber(row[28]);
                        sums.fullCourseQty += parseNumber(row[30]);
                        sums.todayFullCourseQty += parseNumber(row[31]);
                        sums.paidTrialLongTail += parseNumber(row[17]);
                        sums.fullCourseMoney += parseNumber(row[34]);
                        
                        sums.todayMtdPercent += parseNumber(row[45]);
                        sums.todaySales += parseNumber(row[49]);
                    });
                    
                    if (processedData.length > 0) {
                        sums.todayMtdPercent = sums.todayMtdPercent / processedData.length;
                        sums.avgFutureICB = sums.avgFutureICB / processedData.length; 
                    }
                }

                return { ...globalSummary, ...sums };
            }, [selectedBrand, selectedCenter, selectedTherapist, searchTerm, processedData, grandTotalRow, globalSummary]);

            const requestSort = (key) => {
                let direction = 'asc';
                if (sortConfig.key === key && sortConfig.direction === 'asc') direction = 'desc';
                setSortConfig({ key, direction });
            };

            const formatDisplayValue = (val, format) => {
                if (val === undefined || isNaN(val)) return '-';
                if (format === 'percent') return `${val.toFixed(2)}%`;
                if (format === 'currency') return `$${val.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
                return Number.isInteger(val) ? val.toLocaleString() : val.toFixed(2).replace(/\.00$/, '');
            };

            if (loading && data.length === 0) return (
                <div className="flex h-screen w-full items-center justify-center bg-gray-50">
                    <div className="flex flex-col items-center gap-4">
                        <div className="h-12 w-12 animate-spin rounded-full border-4 border-blue-500 border-t-transparent"></div>
                        <p className="text-gray-600 font-medium">Loading Real Time Data...</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-gray-50 p-6 font-sans text-gray-800">
                
                {/* Header & Controls */}
                <div className="mb-6 flex flex-col gap-4 bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center w-full gap-4">
                        <h1 className="text-2xl font-bold flex items-center gap-2 text-gray-900">
                            <BarChart3 className="text-blue-600 w-6 h-6" /> 少女膠原推廣實時成績
                        </h1>
                        <div className="flex items-center gap-3 text-sm text-gray-600">
                            {lastSyncTime && <span className="font-medium">Last synced: {lastSyncTime.toLocaleString()}</span>}
                            <button 
                                onClick={fetchData} 
                                disabled={loading} 
                                className="flex items-center gap-1.5 px-3 py-1.5 bg-blue-50 text-blue-700 font-semibold rounded-lg hover:bg-blue-100 transition-colors disabled:opacity-50"
                            >
                                <RefreshCw className={`w-4 h-4 ${loading ? 'animate-spin' : ''}`} />
                                {loading ? 'Syncing...' : 'Resync'}
                            </button>
                        </div>
                    </div>
                    
                    {/* Filters aligned for both Summary and Table */}
                    <div className="flex flex-col sm:flex-row gap-3 w-full items-center pt-3 border-t border-gray-100">
                        <div className="flex items-center gap-2 text-sm font-semibold text-gray-600 bg-gray-50 px-3 py-2 rounded-lg border border-gray-200">
                            <FilterIcon className="w-4 h-4" /> Filters:
                        </div>
                        <select 
                            className="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white shadow-sm min-w-[140px]"
                            value={selectedBrand} 
                            onChange={(e) => { setSelectedBrand(e.target.value); setSelectedCenter('All'); setSelectedTherapist('All'); }}
                        >
                            {brands.map(b => (
                                <option key={b} value={b}>{b === 'All' ? 'All Brands' : b}</option>
                            ))}
                        </select>
                        <select 
                            className="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white shadow-sm min-w-[140px]"
                            value={selectedCenter} 
                            onChange={(e) => { setSelectedCenter(e.target.value); setSelectedTherapist('All'); }}
                        >
                            {centers.map(c => (
                                <option key={c} value={c}>{c === 'All' ? 'All Floor Levels' : c}</option>
                            ))}
                        </select>
                        <select 
                            className="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white shadow-sm min-w-[140px]"
                            value={selectedTherapist} 
                            onChange={(e) => setSelectedTherapist(e.target.value)}
                        >
                            {therapists.map(t => (
                                <option key={t} value={t}>{t === 'All' ? 'All Therapists' : t}</option>
                            ))}
                        </select>
                        <div className="relative">
                            <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 w-4 h-4" />
                            <input
                                type="text" placeholder="Search data..."
                                className="pl-9 pr-4 py-2 bg-white shadow-sm border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 w-full"
                                value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}
                            />
                        </div>
                    </div>
                </div>

                {error && (
                    <div className="mb-6 p-4 bg-red-50 border border-red-200 text-red-700 rounded-xl flex items-start gap-3">
                        <AlertCircle className="shrink-0 w-5 h-5 mt-0.5" />
                        <div>
                            <h3 className="font-semibold">Unable to fetch sheet data live</h3>
                            <p className="text-sm mt-1">{error}</p>
                            <p className="text-sm mt-1 font-medium">Currently displaying fallback visual structure.</p>
                        </div>
                    </div>
                )}

                {/* --- SUMMARY PANEL --- */}
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-10">
                    
                    {/* 1st Section (Dark Blue Box) */}
                    <div className="bg-blue-800 rounded-xl p-3 flex flex-col shadow-lg h-full transition-transform hover:-translate-y-1">
                        <h3 className="text-center font-bold text-lg mb-2 border-b border-blue-600 pb-1 tracking-wide text-white">200分發點</h3>
                        
                        <div className="flex flex-col items-center bg-white/70 rounded-lg py-2 mb-2 shadow-sm">
                            <span className="text-4xl font-extrabold text-gray-800">{summaryData.totalNodes.toLocaleString()}</span>
                            <span className="text-[10px] text-gray-700 mt-0.5 uppercase tracking-wider font-bold">Total Nodes</span>
                        </div>
                        
                        <div className="flex justify-between items-stretch gap-2 mt-auto">
                            <div className="bg-white/70 border border-white/50 rounded-lg p-1.5 flex-1 flex flex-col justify-center items-center text-center shadow-inner">
                                <span className="text-lg font-extrabold text-gray-800">{summaryData.nodeDelta > 0 ? `+${summaryData.nodeDelta}` : summaryData.nodeDelta}</span>
                                <span className="text-[9px] text-gray-700 font-bold uppercase mt-0.5 leading-tight">Node 3 Days Changes</span>
                            </div>
                            <div className="bg-white/70 border border-white/50 rounded-lg p-1.5 flex-1 flex flex-col justify-center items-center text-center shadow-inner">
                                <span className="text-lg font-extrabold text-gray-800">
                                    {(summaryData.totalNodes / (summaryData.identitiesB5 || 1)).toFixed(1)}
                                </span>
                                <span className="text-[9px] text-gray-700 font-bold uppercase mt-0.5 leading-tight">平均每人<br/>分發點數量</span>
                            </div>
                        </div>
                    </div>

                    {/* 2nd Section (Orange Box) */}
                    <div className="bg-orange-500 rounded-xl p-3 flex flex-col shadow-lg h-full transition-transform hover:-translate-y-1">
                        <h3 className="text-center font-bold text-lg mb-2 border-b border-orange-400 pb-1 tracking-wide text-white">862+ICB</h3>
                        
                        <div className="flex flex-col items-center bg-white/70 rounded-lg py-2 mb-2 shadow-sm">
                            <span className="text-4xl font-extrabold text-gray-800">{summaryData.futureICB.toLocaleString()}</span>
                            <span className="text-[10px] text-gray-700 mt-0.5 uppercase tracking-wider font-bold">未來 ICB Booking</span>
                        </div>
                        
                        <div className="grid grid-cols-3 gap-1 mt-auto">
                            <div className="bg-white/70 border border-white/50 rounded-lg p-1.5 flex flex-col justify-center items-center text-center shadow-inner">
                                <span className="text-base font-extrabold text-gray-800">{summaryData.avgFutureICB.toLocaleString()}</span>
                                <span className="text-[8px] text-gray-700 font-bold uppercase leading-tight mt-1">未來 人均<br/>ICB Booking</span>
                            </div>
                            <div className="bg-white/70 border border-white/50 rounded-lg p-1.5 flex flex-col justify-center items-center text-center shadow-inner">
                                <span className="text-base font-extrabold text-gray-800">{summaryData.todayNewICB.toLocaleString()}</span>
                                <span className="text-[8px] text-gray-700 font-bold uppercase leading-tight mt-1">今天新增<br/>ICB Booking</span>
                            </div>
                            <div className="bg-white/70 border border-white/50 rounded-lg p-1.5 flex flex-col justify-center items-center text-center shadow-inner">
                                <span className="text-base font-extrabold text-gray-800">{summaryData.monthlyActive.toLocaleString()}</span>
                                <span className="text-[8px] text-gray-700 font-bold uppercase leading-tight mt-1">當月<br/>激活人數</span>
                            </div>
                        </div>
                    </div>

                    {/* 3rd Section (Green Box) */}
                    <div className="bg-[#4caf50] rounded-xl p-3 flex flex-col shadow-lg h-full transition-transform hover:-translate-y-1">
                        <h3 className="text-center font-bold text-lg mb-2 border-b border-[#3d8c40] pb-1 tracking-wide text-white">High PEXO</h3>
                        
                        <div className="grid grid-cols-2 gap-2 mb-2">
                            <div className="flex flex-col items-center bg-white/70 rounded-lg py-2 shadow-sm">
                                <div className="text-3xl font-extrabold flex items-baseline text-gray-800">
                                    {summaryData.ptQty.toLocaleString()} 
                                    <span className="text-base text-gray-600 ml-1 font-bold">({summaryData.todayPtQty})</span>
                                </div>
                                <span className="text-[9px] text-gray-700 mt-0.5 uppercase tracking-wider font-extrabold">PT Qty (今日)</span>
                            </div>
                            
                            <div className="flex flex-col items-center bg-white/70 rounded-lg py-2 shadow-sm">
                                <div className="text-3xl font-extrabold flex items-baseline text-gray-800">
                                    {summaryData.fullCourseQty.toLocaleString()} 
                                    <span className="text-base text-gray-600 ml-1 font-bold">({summaryData.todayFullCourseQty})</span>
                                </div>
                                <span className="text-[9px] text-gray-700 mt-0.5 uppercase tracking-wider font-extrabold">Full Course Qty (今日)</span>
                            </div>
                        </div>
                        
                        <div className="flex justify-between items-stretch gap-2 mt-auto">
                            <div className="bg-white/70 border border-white/50 rounded-lg p-1.5 flex-1 flex flex-col justify-center items-center text-center shadow-inner">
                                <span className="text-xl font-extrabold text-gray-800">{summaryData.paidTrialLongTail.toLocaleString()}</span>
                                <span className="text-[9px] text-gray-700 font-extrabold uppercase mt-1 leading-tight">Paid Trial<br/>龍尾 Book</span>
                            </div>
                            <div className="bg-white/70 border border-white/50 rounded-lg p-1.5 flex-1 flex flex-col justify-center items-center text-center shadow-inner">
                                <span className="text-xl font-extrabold text-gray-800">${summaryData.fullCourseMoney.toLocaleString()}</span>
                                <span className="text-[9px] text-gray-700 font-extrabold uppercase mt-1 leading-tight">Full Course $</span>
                            </div>
                        </div>
                    </div>

                    {/* 4th Section (Purple Box) */}
                    <div className="bg-purple-600 rounded-xl p-3 flex flex-col shadow-lg h-full transition-transform hover:-translate-y-1">
                        <h3 className="text-center font-bold text-lg mb-2 border-b border-purple-400 pb-1 tracking-wide text-white">200% 紫燈</h3>
                        
                        <div className="flex flex-col justify-between h-full gap-2">
                            <div className="flex flex-col items-center bg-white/70 rounded-lg py-3 flex-1 justify-center shadow-sm">
                                <div className="text-3xl font-extrabold text-gray-800">{summaryData.todayMtdPercent.toLocaleString()}%</div>
                                <span className="text-[10px] text-gray-700 mt-1 font-bold uppercase tracking-wider">Today MTD%</span>
                            </div>
                            
                            <div className="flex flex-col items-center bg-white/70 rounded-lg py-3 flex-1 justify-center shadow-sm">
                                <div className="text-3xl font-extrabold text-gray-800">${summaryData.todaySales.toLocaleString()}</div>
                                <span className="text-[10px] text-gray-700 mt-1 font-bold uppercase tracking-wider">今日銷售額</span>
                            </div>
                        </div>
                    </div>

                </div>

                {/* --- TABLE SEPARATION AND TITLE --- */}
                <div className="mt-10 mb-4">
                    <hr className="border-t-2 border-gray-200 mb-6" />
                    <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2 px-2">
                        <TableIcon className="w-5 h-5 text-blue-600" />
                        Detailed Table
                    </h2>
                </div>

                {/* --- DATA TABLE --- */}
                <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div className="overflow-x-auto max-h-[600px]">
                        <table className="w-full text-sm text-left whitespace-nowrap">
                            <thead className="text-xs text-gray-700 bg-gray-50 sticky top-0 z-10 shadow-sm">
                                {/* Multi-level Super Headers */}
                                <tr>
                                    <th colSpan="3" className="bg-white border-b border-gray-200 border-r"></th>
                                    
                                    <th colSpan="3" className="bg-blue-800 text-white text-center font-bold py-2.5 border-r border-blue-900 text-[13px] tracking-wide">
                                        200 Nodes
                                    </th>

                                    <th colSpan="4" className="bg-orange-500 text-white text-center font-bold py-2.5 border-r border-orange-600 text-[13px] tracking-wide">
                                        862+ICB
                                    </th>
                                    
                                    <th colSpan="4" className="bg-[#4caf50] text-white text-center font-bold py-2.5 border-r border-green-700 text-[13px] tracking-wide">
                                        High Pexo PT/Head
                                    </th>
                                    
                                    <th colSpan="2" className="bg-purple-600 text-white text-center font-bold py-2.5 text-base tracking-wide">
                                        200% Purple Light
                                    </th>
                                </tr>
                                
                                {/* Sortable KPI Headers */}
                                <tr>
                                    {/* Sortable Main Hierarchy Headers */}
                                    <th className="px-3 py-2 font-bold hover:bg-gray-200 transition-colors border-b border-r border-gray-200 bg-gray-50 align-top min-w-[120px]">
                                        <div className="flex items-center gap-1 cursor-pointer mb-1" onClick={() => requestSort('Brand')}>
                                            Brand 
                                            {sortConfig.key === 'Brand' ? (sortConfig.direction === 'asc' ? <ChevronUp className="w-4 h-4" /> : <ChevronDown className="w-4 h-4" />) : <ChevronDown className="w-4 h-4 opacity-20" />}
                                        </div>
                                        <select 
                                            className="w-full text-xs font-normal border border-gray-300 rounded text-gray-700 bg-white py-1 px-1 focus:outline-none focus:ring-1 focus:ring-blue-500 mt-1"
                                            value={selectedBrand}
                                            onChange={(e) => { setSelectedBrand(e.target.value); setSelectedCenter('All'); setSelectedTherapist('All'); }}
                                        >
                                            {brands.map(b => <option key={b} value={b}>{b === 'All' ? 'All Brands' : b}</option>)}
                                        </select>
                                    </th>
                                    <th className="px-3 py-2 font-bold hover:bg-gray-200 transition-colors border-b border-r border-gray-200 bg-gray-50 align-top min-w-[140px]">
                                        <div className="flex items-center gap-1 cursor-pointer mb-1" onClick={() => requestSort('Center')}>
                                            Floor Level (Center)
                                            {sortConfig.key === 'Center' ? (sortConfig.direction === 'asc' ? <ChevronUp className="w-4 h-4" /> : <ChevronDown className="w-4 h-4" />) : <ChevronDown className="w-4 h-4 opacity-20" />}
                                        </div>
                                        <select 
                                            className="w-full text-xs font-normal border border-gray-300 rounded text-gray-700 bg-white py-1 px-1 focus:outline-none focus:ring-1 focus:ring-blue-500 mt-1"
                                            value={selectedCenter}
                                            onChange={(e) => { setSelectedCenter(e.target.value); setSelectedTherapist('All'); }}
                                        >
                                            {centers.map(c => <option key={c} value={c}>{c === 'All' ? 'All Floors' : c}</option>)}
                                        </select>
                                    </th>
                                    <th className="px-3 py-2 font-bold hover:bg-gray-200 transition-colors border-b border-r border-gray-200 bg-gray-50 align-top min-w-[140px]">
                                        <div className="flex items-center gap-1 cursor-pointer mb-1" onClick={() => requestSort('Therapist')}>
                                            Therapist
                                            {sortConfig.key === 'Therapist' ? (sortConfig.direction === 'asc' ? <ChevronUp className="w-4 h-4" /> : <ChevronDown className="w-4 h-4" />) : <ChevronDown className="w-4 h-4 opacity-20" />}
                                        </div>
                                        <select 
                                            className="w-full text-xs font-normal border border-gray-300 rounded text-gray-700 bg-white py-1 px-1 focus:outline-none focus:ring-1 focus:ring-blue-500 mt-1"
                                            value={selectedTherapist}
                                            onChange={(e) => setSelectedTherapist(e.target.value)}
                                        >
                                            {therapists.map(t => <option key={t} value={t}>{t === 'All' ? 'All Therapists' : t}</option>)}
                                        </select>
                                    </th>
                                    
                                    {/* Sortable Custom KPI Headers mapping their specific background classes */}
                                    {activeKPIs.map(kpi => (
                                        <th key={kpi.letter} onClick={() => requestSort(kpi.letter)} className={`px-4 py-3 font-bold cursor-pointer hover:opacity-80 transition-opacity border-b border-r border-black/5 text-right group align-top ${kpi.headerClass}`}>
                                            <div className="flex items-center justify-end gap-1">
                                                <span className="truncate max-w-[120px]" title={kpi.displayName}>{kpi.displayName}</span>
                                                {sortConfig.key === kpi.letter ? (
                                                    sortConfig.direction === 'asc' ? <ChevronUp className="w-4 h-4" /> : <ChevronDown className="w-4 h-4" />
                                                ) : <ChevronDown className="w-4 h-4 opacity-0 group-hover:opacity-40" />}
                                            </div>
                                        </th>
                                    ))}
                                </tr>
                            </thead>
                            
                            <tbody className="divide-y divide-gray-100">
                                {processedData.length > 0 ? (
                                    processedData.map((row) => (
                                        <tr key={row.id} className="hover:bg-gray-50 transition-colors">
                                            <td className="px-5 py-2.5 font-semibold text-gray-800 border-r border-gray-100">{row.Brand}</td>
                                            <td className="px-5 py-2.5 font-semibold text-gray-800 border-r border-gray-100">{row.Center}</td>
                                            <td className="px-5 py-2.5 text-gray-600 border-r border-gray-100">{row.Therapist}</td>
                                            
                                            {activeKPIs.map(kpi => {
                                                const condClass = getConditionalFormat(kpi.name, row[kpi.letter]);
                                                return (
                                                    <td key={kpi.letter} className={`px-4 py-2.5 text-right border-r border-gray-50/50 ${condClass ? condClass : 'text-gray-700'}`}>
                                                        {formatDisplayValue(row[kpi.letter], kpi.format)}
                                                    </td>
                                                );
                                            })}
                                        </tr>
                                    ))
                                ) : (
                                    <tr>
                                        <td colSpan={100} className="px-6 py-12 text-center text-gray-500 font-medium bg-gray-50">
                                            No matching data found for the applied filters.
                                        </td>
                                    </tr>
                                )}
                            </tbody>
                        </table>
                    </div>
                    <div className="p-4 border-t border-gray-200 bg-gray-50 text-xs text-gray-500 text-right font-medium">
                        Showing {processedData.length} active rows.
                    </div>
                </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
