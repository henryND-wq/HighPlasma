        const Zap = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>;

        // Helper to parse CSV manually
        function parseCSV(text) {
            const result = [];
            const lines = text.split(/\r?\n/);
            for (let line of lines) {
                const row = [];
                let inQuotes = false;
                let val = "";
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) { row.push(val.trim()); val = ""; }
                    else val += char;
                }
                row.push(val.trim());
                result.push(row);
            }
            return result;
        }

        const parseNumber = (val) => {
            if (!val || val === '-' || val === '#N/A' || val === 'no data atm' || val === '#DIV/0!') return 0;
            const clean = String(val).replace(/,/g, '').replace(/%/g, '').replace(/\$/g, '').replace(/¥/g, '');
            const num = parseFloat(clean);
            return isNaN(num) ? 0 : num;
        };

        // Short form formatting for K and M
        const formatShortCurrency = (val) => {
            if (val === undefined || isNaN(val)) return '-';
            if (val >= 1000000) return '$' + (val / 1000000).toFixed(1) + 'M';
            if (val >= 1000) return '$' + (val / 1000).toFixed(1) + 'K';
            return '$' + val.toLocaleString();
        };

        const getConditionalFormat = (colName, val, targetRatio, ranges) => {
            const num = parseFloat(val);
            if (isNaN(num)) return { className: 'text-gray-800' };

            let className = 'text-gray-900 font-medium ';
            let style = {};

            if (colName === 'Node' || colName === '平均每人') {
                if (num > 200) className += 'bg-green-200';
                else if (num >= 150) className += 'bg-yellow-200';
                else if (num >= 80) className += 'bg-orange-200';
                else className += 'bg-red-200';
            }
            else if (colName === '3天增加') {
                if (num > 0) className += 'bg-green-200';
                else if (num < 0) className += 'bg-red-200';
            }
            else if (colName === '未來 人均 ICB Booking') {
                if (num > 25) className += 'bg-green-200';
                else if (num >= 15) className += 'bg-yellow-200';
                else className += 'bg-red-200';
            }
            else if (colName === '今天新增 ICB Booking') {
                if (num >= 3) className += 'bg-green-200';
                else if (num >= 1) className += 'bg-yellow-200';
                else className += 'bg-red-200';
            }
            else if (colName === 'PT Qty' || colName === '今天 PT QTY' || colName === 'Full course Qty.') {
                if (num >= 3) className += 'bg-green-200';
                else if (num >= 1) className += 'bg-yellow-200';
                else className += 'bg-red-200';
            }
            else if (colName === 'Today MTD%') {
                // Multiplied targetRatio by 100 to map accurately to percentage display numbers (e.g. 100%)
                if (targetRatio && num > (targetRatio * 100)) className += 'bg-purple-300 font-bold';
                else if (num >= 100) className += 'bg-green-200';
                else if (num >= 90) className += 'bg-yellow-200';
                else className += 'bg-red-200';
            }
            else if (['未來 ICB Booking', '當月 激活人數', '今天 Full course', 'Paid Trial 龍尾 Book'].includes(colName)) {
                // Color Gradient (Low to High = Red to Green)
                const range = ranges[colName];
                if (range && range.max > range.min) {
                    const ratio = (num - range.min) / (range.max - range.min);
                    const hue = ratio * 120; // 0 is Red, 120 is Green
                    style.backgroundColor = `hsl(${hue}, 80%, 85%)`;
                } else if (range && range.max === range.min && range.max > 0) {
                    style.backgroundColor = `hsl(120, 80%, 85%)`; // solid green if all are equal max
                }
            }

            return { className, style };
        };

        // --- DYNAMIC MAPPING HELPERS ---
        function getDynamicIndex(headers, searchTerms, fallbackIndex) {
            // First pass: Exact match (ignoring newlines from sheets)
            for (let i = 0; i < headers.length; i++) {
                const h = (headers[i] || '').replace(/[\r\n]+/g, ' ').replace(/"/g, '').trim().toLowerCase();
                if (searchTerms.some(term => h === term.toLowerCase())) {
                    return i;
                }
            }
            // Second pass: Includes partial match
            for (let i = 0; i < headers.length; i++) {
                const h = (headers[i] || '').replace(/[\r\n]+/g, ' ').replace(/"/g, '').trim().toLowerCase();
                if (searchTerms.some(term => h.includes(term.toLowerCase()))) {
                    return i;
                }
            }
            return fallbackIndex;
        }

        const GOOGLE_SHEET_ID = '1mtORjZ4a5EyrlPJsiejhXuMZiyw5MStoXdxn5l1Jhno';

        function App() {
            const [data, setData] = useState([]);
            const [headers, setHeaders] = useState([]);
            const [colMap, setColMap] = useState(null); // Holds dynamic indices
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            const [grandTotalRow, setGrandTotalRow] = useState(null);
            const [mtdTargetRatio, setMtdTargetRatio] = useState(null);

            const [searchTerm, setSearchTerm] = useState('');
            const [selectedBrand, setSelectedBrand] = useState('All');
            const [selectedCenter, setSelectedCenter] = useState('All');
            const [selectedTherapist, setSelectedTherapist] = useState('All');
            const [lastSyncTime, setLastSyncTime] = useState(null);
            
            const [sortConfig, setSortConfig] = useState({ key: null, direction: 'asc' });

            const fetchData = useCallback(async () => {
                try {
                    setLoading(true);
                    const sheetId = GOOGLE_SHEET_ID;
                    
                    const urls = [
                    `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=(WEB)Real%20Time`
                    ];

                    const [realTimeRes] = await Promise.all(
                        urls.map(url => fetch(url))
                    );

                    if (!realTimeRes.ok) throw new Error("Could not fetch the sheet. Please ensure it's set to 'Anyone with the link can view'.");
                    
                    const realTimeCsv = await realTimeRes.text();
                    const realTimeParsed = parseCSV(realTimeCsv);

                    // Find Grand Total row for fallback calculations
                    const gtRow = realTimeParsed.find(row => row[2] === 'Grand Total');
                    if (gtRow) setGrandTotalRow(gtRow);

                    // Extract target ratio from BJ3 / BM2 * 1.5
                    // BJ = index 61, BM = index 64. Row 2 = index 1, Row 3 = index 2
                    let targetRatio = null;
                    if (realTimeParsed.length > 2) {
                        const bj3 = parseNumber(realTimeParsed[2][61]);
                        const bm2 = parseNumber(realTimeParsed[1][64]);
                        if (bm2 > 0) {
                            targetRatio = (bj3 / bm2) * 1.5;
                        }
                    }
                    setMtdTargetRatio(targetRatio);

                    // --- 2. EXTRACT HEADER INDICES DYNAMICALLY ---
                    let headerRowIdx = 0;
                    for (let i = 0; i < Math.min(10, realTimeParsed.length); i++) {
                        if (realTimeParsed[i].some(cell => cell.toLowerCase().includes('brand') || cell.toLowerCase().includes('center'))) {
                            headerRowIdx = i;
                            break;
                        }
                    }

                    const extractedHeaders = realTimeParsed[headerRowIdx];
                    
                    // Core Mapping - Array strings are fallbacks to find headers if they shift
                    const mappedIndices = {
                        brand: getDynamicIndex(extractedHeaders, ['Brand'], 0),
                        center: getDynamicIndex(extractedHeaders, ['Center'], 2),
                        therapist: getDynamicIndex(extractedHeaders, ['Therapist'], 3),
                        
                        node: getDynamicIndex(extractedHeaders, ['Node', 'Nodes'], 22), // W
                        avgNode: getDynamicIndex(extractedHeaders, ['平均每人分發點數量', '平均每人'], 24), // Y
                        node3Days: getDynamicIndex(extractedHeaders, ['3天增加', 'Node 3 Days Changes'], 26), // AA
                        
                        futureICB: getDynamicIndex(extractedHeaders, ['未來 ICB Booking', '未來 ICB'], 13), // N
                        avgFutureICB: getDynamicIndex(extractedHeaders, ['未來 人均', 'CB Booking', 'ICB Booking'], 14), // O
                        todayNewICB: getDynamicIndex(extractedHeaders, ['今天新增', 'CB Booking', 'ICB Booking'], 15), // P
                        monthlyActive: getDynamicIndex(extractedHeaders, ['當月 激活人數', '激活人數'], 17), // R
                        
                        ptQty: getDynamicIndex(extractedHeaders, ['PT Qty'], 27), // AB
                        todayPtQty: getDynamicIndex(extractedHeaders, ['今天 PT QTY'], 28), // AC
                        
                        fullCourseQty: getDynamicIndex(extractedHeaders, ['Full course Qty.', 'Full course Qty'], 30), // AE
                        todayFullCourseQty: getDynamicIndex(extractedHeaders, ['今天 Full course'], 33), // AH - Updated
                        paidTrialLongTail: getDynamicIndex(extractedHeaders, ['Paid Trial 龍尾 Book', '龍尾 Book'], 35), // AJ - Updated
                        highPexoTodaySales: getDynamicIndex(extractedHeaders, ['Today $', '今日銷售', 'Today$'], 34), // AI - Updated
                        fullCourseMoney: getDynamicIndex(extractedHeaders, ['$'], 32), // AG - Updated
                        
                        todayMtdPercent: getDynamicIndex(extractedHeaders, ['Today MTD%'], 45), // AT
                        todaySales: getDynamicIndex(extractedHeaders, ['今天銷售額', '今日銷售'], 49) // AX
                    };
                    setColMap(mappedIndices);

                    // Extract and "Fill Down" missing Brands/Centers to fetch Therapist rows correctly
                    const rawData = realTimeParsed.slice(headerRowIdx + 1, 300).filter(row => row.length > 5); 
                    
                    let currentBrand = 'Unknown';
                    let currentCenter = 'Unknown';
                    
                    const filledData = rawData.map(row => {
                        if (row[mappedIndices.brand] && row[mappedIndices.brand].trim() !== '') currentBrand = row[mappedIndices.brand];
                        else row[mappedIndices.brand] = currentBrand;
                        
                        if (row[mappedIndices.center] && row[mappedIndices.center].trim() !== '') currentCenter = row[mappedIndices.center];
                        else row[mappedIndices.center] = currentCenter;
                        
                        return row;
                    });

                    const finalHeaders = extractedHeaders.map((h, i) => h || `Col ${i + 1}`);

                    setHeaders(finalHeaders);
                    setData(filledData);
                    setLastSyncTime(new Date());
                    setError(null);

                } catch (err) {
                    setError(err.message);
                    
                    setColMap({ brand: 0, center: 2, therapist: 3, node: 22, avgNode: 24, node3Days: 26, futureICB: 13, avgFutureICB: 14, todayNewICB: 15, monthlyActive: 17, ptQty: 27, todayPtQty: 28, fullCourseQty: 30, todayFullCourseQty: 33, paidTrialLongTail: 35, highPexoTodaySales: 34, fullCourseMoney: 32, todayMtdPercent: 45, todaySales: 49 });
                    setMtdTargetRatio(1.2); 

                    let mockGt = new Array(70).fill('0');
                    mockGt[13] = '342'; mockGt[14] = '1.2'; mockGt[15] = '45'; mockGt[17] = '280';
                    mockGt[22] = '862'; mockGt[24] = '200'; mockGt[26] = '12';
                    mockGt[27] = '120'; mockGt[28] = '15'; mockGt[30] = '60'; mockGt[33] = '8'; mockGt[35] = '35'; mockGt[34] = '45000'; mockGt[32] = '125000'; 
                    mockGt[45] = '42.5'; mockGt[49] = '35000';
                    setGrandTotalRow(mockGt);

                    setHeaders(['Brand', 'PIC', 'Center', 'Therapist', ...Array(50).fill('Data')]);
                    setData([
                        ['Brand A', 'John Doe', 'Center North', 'Alice', ...Array(50).fill('100')],
                        ['Brand B', 'Jane Smith', 'Center South', 'Bob', ...Array(50).fill('200')],
                    ]);
                    setLastSyncTime(new Date());
                } finally {
                    setLoading(false);
                }
            }, []);

            useEffect(() => {
                fetchData();
            }, [fetchData]);

            // Constructing Active KPI Table Definitions Dynamically
            const activeKPIs = useMemo(() => {
                if (!colMap) return [];
                
                return [
                    // 200 Nodes Group
                    { id: 'node', index: colMap.node, name: 'Node', format: 'number', headerClass: 'bg-blue-100 text-blue-900 border-t border-blue-200' },
                    { id: 'avgNode', index: colMap.avgNode, name: '平均每人', format: 'number', headerClass: 'bg-blue-100 text-blue-900 border-t border-blue-200' },
                    { id: 'node3Days', index: colMap.node3Days, name: '3天增加', format: 'number', headerClass: 'bg-blue-100 text-blue-900 border-t border-blue-200' },
                    
                    // 862+ICB Group
                    { id: 'futureICB', index: colMap.futureICB, name: '未來 ICB Booking', format: 'number', headerClass: 'bg-orange-100 text-orange-900 border-t border-orange-200' },
                    { id: 'avgFutureICB', index: colMap.avgFutureICB, name: '未來 人均 ICB Booking', format: 'number', headerClass: 'bg-orange-100 text-orange-900 border-t border-orange-200' },
                    { id: 'todayNewICB', index: colMap.todayNewICB, name: '今天新增 ICB Booking', format: 'number', headerClass: 'bg-orange-100 text-orange-900 border-t border-orange-200' },
                    { id: 'monthlyActive', index: colMap.monthlyActive, name: '當月 激活人數', format: 'number', headerClass: 'bg-orange-100 text-orange-900 border-t border-orange-200' },
                    
                    // High Pexo PT/Head Group
                    { id: 'ptQty', index: colMap.ptQty, name: 'PT Qty', format: 'number', headerClass: 'bg-green-100 text-green-900 border-t border-green-200' },
                    { id: 'todayPtQty', index: colMap.todayPtQty, name: '今天 PT QTY', format: 'number', headerClass: 'bg-green-100 text-green-900 border-t border-green-200' },
                    { id: 'fullCourseQty', index: colMap.fullCourseQty, name: 'Full course Qty.', format: 'number', headerClass: 'bg-green-100 text-green-900 border-t border-green-200' },
                    { id: 'todayFullCourseQty', index: colMap.todayFullCourseQty, name: '今天 Full course', format: 'number', headerClass: 'bg-green-100 text-green-900 border-t border-green-200' }, // Replaced with todayFullCourseQty mapping
                    { id: 'paidTrialLongTail', index: colMap.paidTrialLongTail, name: 'Paid Trial 龍尾 Book', format: 'number', headerClass: 'bg-green-100 text-green-900 border-t border-green-200' },
                    
                    // 200% Purple Light Group
                    { id: 'todayMtdPercent', index: colMap.todayMtdPercent, name: 'Today MTD%', format: 'percent', headerClass: 'bg-purple-100 text-purple-900 border-t border-purple-200' },
                    { id: 'todaySales', index: colMap.todaySales, name: '今天銷售額', format: 'currency', headerClass: 'bg-purple-100 text-purple-900 border-t border-purple-200' }
                ].map(kpi => ({
                    ...kpi,
                    displayName: (headers[kpi.index] && headers[kpi.index].trim() !== '') ? headers[kpi.index].replace(/[\r\n]+/g, ' ').replace(/"/g, '') : kpi.name
                }));
            }, [colMap, headers]);

            const brands = useMemo(() => {
                if (!colMap) return [];
                const validRows = data.filter(r => r[colMap.center] !== 'Grand Total');
                return ['All', ...new Set(validRows.map(r => r[colMap.brand]).filter(Boolean))];
            }, [data, colMap]);

            const centers = useMemo(() => {
                if (!colMap) return [];
                const validRows = data.filter(r => r[colMap.center] !== 'Grand Total');
                const brandFiltered = selectedBrand === 'All' ? validRows : validRows.filter(r => r[colMap.brand] === selectedBrand);
                return ['All', ...new Set(brandFiltered.map(r => r[colMap.center]).filter(Boolean))];
            }, [data, selectedBrand, colMap]);

            const therapists = useMemo(() => {
                if (!colMap) return [];
                const validRows = data.filter(r => r[colMap.center] !== 'Grand Total');
                let brandFiltered = selectedBrand === 'All' ? validRows : validRows.filter(r => r[colMap.brand] === selectedBrand);
                let centerFiltered = selectedCenter === 'All' ? brandFiltered : brandFiltered.filter(r => r[colMap.center] === selectedCenter);
                return ['All', ...new Set(centerFiltered.map(r => r[colMap.therapist]).filter(Boolean))];
            }, [data, selectedBrand, selectedCenter, colMap]);

            const processedData = useMemo(() => {
                if (!colMap || activeKPIs.length === 0) return [];
                let filtered = data.filter(row => row[colMap.center] !== 'Grand Total');

                if (selectedBrand !== 'All') filtered = filtered.filter(row => row[colMap.brand] === selectedBrand);
                if (selectedCenter !== 'All') filtered = filtered.filter(row => row[colMap.center] === selectedCenter);
                if (selectedTherapist !== 'All') filtered = filtered.filter(row => row[colMap.therapist] === selectedTherapist);
                if (searchTerm) filtered = filtered.filter(row => row.join(' ').toLowerCase().includes(searchTerm.toLowerCase()));

                let result = filtered.map((row, idx) => {
                    let mapped = {
                        id: `row-${idx}`, 
                        Brand: row[colMap.brand] || 'Unknown', 
                        Center: row[colMap.center] || 'Unknown',
                        Therapist: row[colMap.therapist] || '', 
                        raw: row
                    };
                    activeKPIs.forEach(kpi => {
                        mapped[kpi.id] = parseNumber(row[kpi.index]);
                    });
                    return mapped;
                });

                if (sortConfig.key) {
                    result.sort((a, b) => {
                        const valA = a[sortConfig.key];
                        const valB = b[sortConfig.key];
                        if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1;
                        if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1;
                        return 0;
                    });
                }
                return result;
            }, [data, searchTerm, selectedBrand, selectedCenter, selectedTherapist, sortConfig, activeKPIs, colMap]);

            // Calculate Min/Max Ranges for Color Gradients
            const colRanges = useMemo(() => {
                const ranges = {};
                if (!activeKPIs) return ranges;
                
                ['未來 ICB Booking', '當月 激活人數', '今天 Full course', 'Paid Trial 龍尾 Book'].forEach(colName => {
                    const kpi = activeKPIs.find(c => c.name === colName);
                    if (kpi) {
                        const vals = processedData.map(r => r[kpi.id]).filter(v => typeof v === 'number' && !isNaN(v));
                        ranges[colName] = {
                            min: vals.length ? Math.min(...vals) : 0,
                            max: vals.length ? Math.max(...vals) : 100
                        };
                    }
                });
                return ranges;
            }, [processedData, activeKPIs]);

            const summaryData = useMemo(() => {
                const isFiltered = selectedBrand !== 'All' || selectedCenter !== 'All' || selectedTherapist !== 'All' || searchTerm !== '';
                
                let sums = {
                    totalNodes: 0, nodeDelta: 0, avgNode: 0,
                    futureICB: 0, avgFutureICB: 0, todayNewICB: 0, monthlyActive: 0,
                    ptQty: 0, todayPtQty: 0, fullCourseQty: 0, todayFullCourseQty: 0, paidTrialLongTail: 0,
                    highPexoTodaySales: 0,
                    fullCourseMoney: 0, todayMtdPercent: 0, todaySales: 0
                };

                if (!colMap) return sums;

                if (!isFiltered && grandTotalRow) {
                    sums.totalNodes = parseNumber(grandTotalRow[colMap.node]);
                    sums.nodeDelta = parseNumber(grandTotalRow[colMap.node3Days]);
                    sums.avgNode = parseNumber(grandTotalRow[colMap.avgNode]);
                    
                    sums.futureICB = parseNumber(grandTotalRow[colMap.futureICB]);
                    sums.avgFutureICB = parseNumber(grandTotalRow[colMap.avgFutureICB]);
                    sums.todayNewICB = parseNumber(grandTotalRow[colMap.todayNewICB]);
                    sums.monthlyActive = parseNumber(grandTotalRow[colMap.monthlyActive]);
                    
                    sums.ptQty = parseNumber(grandTotalRow[colMap.ptQty]);        
                    sums.todayPtQty = parseNumber(grandTotalRow[colMap.todayPtQty]);   
                    sums.fullCourseQty = parseNumber(grandTotalRow[colMap.fullCourseQty]);
                    sums.todayFullCourseQty = parseNumber(grandTotalRow[colMap.todayFullCourseQty]); 
                    sums.paidTrialLongTail = parseNumber(grandTotalRow[colMap.paidTrialLongTail]);  
                    sums.highPexoTodaySales = parseNumber(grandTotalRow[colMap.highPexoTodaySales]); 
                    sums.fullCourseMoney = parseNumber(grandTotalRow[colMap.fullCourseMoney]);    
                    
                    sums.todayMtdPercent = parseNumber(grandTotalRow[colMap.todayMtdPercent]);    
                    sums.todaySales = parseNumber(grandTotalRow[colMap.todaySales]);         
                } else {
                    processedData.forEach(item => {
                        sums.totalNodes += item.node;
                        sums.nodeDelta += item.node3Days;
                        sums.avgNode += item.avgNode;
                        
                        sums.futureICB += item.futureICB;
                        sums.avgFutureICB += item.avgFutureICB; 
                        sums.todayNewICB += item.todayNewICB;
                        sums.monthlyActive += item.monthlyActive;
                        
                        sums.ptQty += item.ptQty;
                        sums.todayPtQty += item.todayPtQty;
                        
                        sums.fullCourseQty += parseNumber(item.raw[colMap.fullCourseQty]);
                        sums.todayFullCourseQty += item.todayFullCourseQty; 
                        
                        sums.paidTrialLongTail += item.paidTrialLongTail;
                        sums.highPexoTodaySales += parseNumber(item.raw[colMap.highPexoTodaySales]);
                        sums.fullCourseMoney += parseNumber(item.raw[colMap.fullCourseMoney]);
                        
                        sums.todayMtdPercent += item.todayMtdPercent;
                        sums.todaySales += item.todaySales;
                    });
                    
                    if (processedData.length > 0) {
                        sums.todayMtdPercent = sums.todayMtdPercent / processedData.length;
                        sums.avgFutureICB = sums.avgFutureICB / processedData.length; 
                        sums.avgNode = sums.avgNode / processedData.length; 
                    }
                }

                return sums;
            }, [selectedBrand, selectedCenter, selectedTherapist, searchTerm, processedData, grandTotalRow, colMap]);

                if (val === undefined || isNaN(val)) return '-';
                if (format === 'percent') return `${val.toFixed(2)}%`;
                if (format === 'currency') return `$${val.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
                return Number.isInteger(val) ? val.toLocaleString() : val.toFixed(2).replace(/\.00$/, '');

                    return rowData.map(val => `"${String(val).replace(/"/g, '""')}"`).join(',');

                    csvHeaders.map(h => `"${String(h).replace(/"/g, '""')}"`).join(','), 
                    ...csvRows
                ].join('\n');
                
                // Add BOM for UTF-8 compatibility in Excel
                const blob = new Blob(["\ufeff", csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", `HK_Collagen_Festival_Data_${new Date().toISOString().slice(0,10)}.csv`);

                                                <span className="whitespace-normal break-words leading-tight" title={kpi.displayName}>{kpi.displayName}</span>
                                                {sortConfig.key === kpi.id ? (
                                                    sortConfig.direction === 'asc' ? <ChevronUp className="w-3 h-3 flex-shrink-0" /> : <ChevronDown className="w-3 h-3 flex-shrink-0" />
                                                ) : <ChevronDown className="w-3 h-3 opacity-0 group-hover:opacity-40 flex-shrink-0" />}
                                            </div>
                                        </th>
                                    ))}
                                </tr>
                            </thead>
                            
                            <tbody className="divide-y divide-gray-100 relative z-0">
                                {processedData.length > 0 ? (
                                    processedData.map((row) => (
                                        <tr key={row.id} className="hover:bg-gray-50 transition-colors group">
                                            {/* Frozen Cells in Body */}
                                            <td className="px-1.5 py-1.5 font-semibold text-[11px] text-gray-800 border-r border-gray-200 bg-white group-hover:bg-gray-50 sticky left-0 z-20 min-w-[60px] max-w-[60px] w-[60px] truncate" title={row.Brand}>{row.Brand}</td>
                                            <td className="px-1.5 py-1.5 font-semibold text-[11px] text-gray-800 border-r border-gray-200 bg-white group-hover:bg-gray-50 sticky left-[60px] z-20 min-w-[90px] max-w-[90px] w-[90px] truncate" title={row.Center}>{row.Center}</td>
                                            <td className="px-1.5 py-1.5 text-[11px] text-gray-600 border-r border-gray-200 bg-white group-hover:bg-gray-50 sticky left-[150px] z-20 min-w-[85px] max-w-[85px] w-[85px] truncate shadow-[4px_0_8px_-2px_rgba(0,0,0,0.1)]" title={row.Therapist}>{row.Therapist}</td>
                                            
                                            {/* Data Cells */}
                                            {activeKPIs.map(kpi => {
                                                const condFormat = getConditionalFormat(kpi.name, row[kpi.id], mtdTargetRatio, colRanges);
                                                return (
                                                    <td key={kpi.id} 
                                                        className={`px-1.5 py-1.5 text-center font-bold text-[11px] border-r border-gray-50/50 ${condFormat.className}`}
                                                        style={condFormat.style}
                                                    >
                                                        {formatDisplayValue(row[kpi.id], kpi.format)}
                                                    </td>
                                                );
                                            })}
                                        </tr>
                                    ))
                                ) : (
                                    <tr>
                                        <td colSpan={100} className="px-6 py-12 text-center text-gray-500 font-medium bg-gray-50 text-xs">
                                            No matching data found for the applied filters.
                                        </td>
                                    </tr>
                                )}
                            </tbody>
                        </table>
                    </div>
                    <div className="p-3 border-t border-gray-200 bg-gray-50 text-[11px] text-gray-500 text-right font-medium">
                        Showing {processedData.length} active rows.
                    </div>
                </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
